"m2e1":{titre:"The welcome pizza",histoire:"To celebrate your arrival in the Valley, a big pizza is cut into 8 equal slices. By the end of the meal, 6 slices have been devoured.",
 q:"What fraction of the pizza is left?",choices:["1/4","1/2","3/4","1/8"],
 indice:"There are 2 slices left out of 8. This fraction can be written more simply…",
 etapes:["There are 8 − 6 = 2 slices left out of 8, that's 2/8 of the pizza.","2/8 simplifies: divide top and bottom by 2 → 1/4.","A quarter of the pizza is left. (2/8 and 1/4 are exactly the same amount!)"]},
"m2e2":{titre:"The orchard apples",unit:"apples",histoire:"In the Valley orchard, you pick 18 apples. The farmer offers you a deal: « Half for you, half for my pie! »",
 q:"How many apples do you keep? (That's 1/2 of 18.)",
 indice:"Taking half means sharing into 2 equal parts: 18 ÷ 2.",
 etapes:["1/2 of 18 is 18 ÷ 2 = 9.","You keep 9 apples, the farmer takes 9: the sharing is fair.","« Taking 1/2 of » = « dividing by 2 ». Likewise, 1/3 of = ÷ 3, 1/4 of = ÷ 4…"]},
"m2e3":{titre:"The gourmands' duel",histoire:"Two brothers share identical cakes. Tim gets 1/3 of one cake, Tom gets 1/4 of the other. Tom grumbles: « It's not fair, 4 is more than 3, he's got less than me! »",
 q:"Who has the bigger slice?",choices:["Tim, with 1/3","Tom, with 1/4","They have exactly the same","Impossible to know"],
 indice:"Imagine the same cake cut into 3 parts, then into 4 parts. The more parts there are… the smaller each part is, right?",
 etapes:["Cutting into 3 gives bigger parts than cutting into 4.","So 1/3 > 1/4: Tim has the bigger slice.","Watch the trap: for fractions with the same numerator, the BIGGER the denominator, the SMALLER the fraction."]},
"m2e4":{titre:"The market flowers",unit:"flowers",histoire:"The Valley florist prepares a giant bouquet of 20 flowers. She wants 3/4 of the bouquet to be sunflowers, her favourite flower.",
 q:"How many sunflowers should she use?",
 indice:"Start by working out 1/4 of 20, then take 3 times that amount.",
 etapes:["1/4 of 20 = 20 ÷ 4 = 5.","3/4 is 3 times more: 3 × 5 = 15.","She uses 15 sunflowers. Method: « divide by the bottom, multiply by the top »."]},
"m2e5":{titre:"Debating the ribbon sharing",histoire:"Lena cuts a ribbon and says: « I took 2/4 of it. » Her sister replies: « So you took half. » Lena frowns: is that really the same thing?",
 q:"Is 2/4 the same as 1/2?",
 justif:["Yes: dividing top and bottom by 2 doesn't change the fraction's value.","No: 2/4 has bigger numbers, so it's a bigger share."],
 indice:"Take a sheet of paper: fold it into 4 and colour in 2 squares. What part of the sheet is coloured?",
 etapes:["2/4: divide numerator and denominator by 2 → 1/2.","Taking 2 parts out of 4 really is taking half.","The same amount can be written as many different fractions: 1/2 = 2/4 = 3/6 = 50/100!"]},
"m2e6":{titre:"The baker's method",histoire:"The baker must give 3/4 of her 24 croissants to the Valley school. She explains her method, but her notes blew away in the wind!",
 q:"Put the steps of working out 3/4 of 24 in order:",
 ordre:["I share 24 into 4 equal parts.","I calculate 24 ÷ 4 = 6: each part is worth 6 croissants.","I take 3 of these parts: 3 × 6 = 18.","3/4 of 24 is therefore 18 croissants."],
 indice:"First we share (using the bottom number), then we take several parts (the top number).",
 etapes:["The denominator (4) says how many parts we share into: 24 ÷ 4 = 6.","The numerator (3) says how many parts we take: 3 × 6 = 18.","3/4 of 24 = 18. The method works for every fraction!"]},
"m2e7":{titre:"The seamstress's ribbon",unit:"m",histoire:"The Valley seamstress has a golden ribbon 2.4 metres long. She must cut it into 4 exactly identical pieces to decorate 4 hats.",
 q:"What will the length of each piece be, in metres?",
 indice:"2.4 m = 24 tenths of a metre. Share 24 tenths into 4.",
 etapes:["We need to work out 2.4 ÷ 4.","2.4 m = 24 tenths. 24 ÷ 4 = 6, so 6 tenths.","Each piece measures 0.6 m (that is, 60 cm).","Check: 0.6 × 4 = 2.4 ✓"]},
"m2e8":{titre:"The square clock",histoire:"The Valley's chimes ring every 3/4 of an hour. It has just rung, and you wonder how much time you have to explore the village before the next chime.",
 q:"3/4 of an hour is how many minutes?",choices:["30 minutes","34 minutes","45 minutes","75 minutes"],
 indice:"An hour = 60 minutes. First work out 1/4 of an hour.",
 etapes:["1 hour = 60 minutes.","1/4 hour = 60 ÷ 4 = 15 minutes.","3/4 hour = 3 × 15 = 45 minutes.","Fractions of an hour are everywhere: 1/4 hour = 15 min, 1/2 hour = 30 min."]},
"m2e9":{titre:"The mystery of the pie",acc:["3/8"],histoire:"A mystery at the castle: the blueberry pie, cut into 8 equal slices, was tampered with overnight! This morning, only 5 slices are left. The cook launches an investigation.",
 q:"What fraction of the pie was eaten? (Answer as a fraction, for example 2/8.)",
 indice:"The whole pie = 8/8. There are 5/8 left… how many eighths have disappeared?",
 etapes:["The whole pie represents 8/8.","Slices eaten: 8 − 5 = 3 slices.","The thief ate 3/8 of the pie.","Remaining + eaten = the whole: 5/8 + 3/8 = 8/8 ✓"]},
"m2e10":{titre:"The bag of magic marbles",unit:"marbles",histoire:"Yanis won 24 magic marbles at the Valley tournament. Generous, he gives 1/3 to Lea and 1/4 to Tom, and keeps the rest for himself.",
 q:"How many marbles does Yanis keep?",
 indice:"Three steps: work out Lea's share, then Tom's, then take both away from the total.",
 etapes:["Lea's share: 1/3 of 24 = 24 ÷ 3 = 8 marbles.","Tom's share: 1/4 of 24 = 24 ÷ 4 = 6 marbles.","Yanis keeps: 24 − 8 − 6 = 10 marbles.","A multi-step problem is solved calmly, one step at a time."]},
"m2e11":{titre:"The twins' bet",histoire:"The Valley twins make a bet. Mia says: « I'll take 1/2 of 10 sweets. » Lia says: « And I'll take 1/5 of 25 sweets — I'll definitely have more, 25 is more than 10! »",
 q:"True or false: the twins get exactly the same number of sweets.",
 justif:["True: 1/2 of 10 = 5 and 1/5 of 25 = 5. A perfect tie!","False: Lia starts from 25 sweets, she'll definitely have more."],
 indice:"Don't guess: calculate each share. 10 ÷ 2 = ? and 25 ÷ 5 = ?",
 etapes:["Mia's share: 1/2 of 10 = 10 ÷ 2 = 5 sweets.","Lia's share: 1/5 of 25 = 25 ÷ 5 = 5 sweets.","5 = 5: it's a perfect tie, the bet is a draw!","A fraction should never be judged « by eye »: everything depends on the starting amount."]},
"m2e12":{titre:"The wise elder's aquarium",unit:"L",histoire:"The Valley's wise elder fills his aquarium from the tap. He stops and observes: « It's filled to 2/3, and it already holds 24 litres. » He looks at you: « Can you tell me its total capacity? »",
 q:"What is the total capacity of the aquarium, in litres?",
 indice:"If 2/3 is worth 24 litres, what is 1/3 worth? And so 3/3?",
 etapes:["2/3 of the aquarium = 24 L, so 1/3 = 24 ÷ 2 = 12 L.","The whole aquarium, that's 3/3 = 3 × 12 = 36 L.","Here we go from the fraction back to the whole — the reverse of usual, and champion-level reasoning!","Check: 2/3 of 36 = 24 ✓"]},
"m2e13":{titre:"The shepherd's break",histoire:"The Valley shepherd takes a 20-minute break in the shade of the great oak. His dog looks at him, as if to say: « What fraction of an hour is that? »",
 q:"20 minutes is what fraction of an hour?",choices:["1/2","1/3","1/4","1/20"],
 indice:"An hour = 60 minutes. How many times does 20 minutes fit into 60?",
 etapes:["1 hour = 60 minutes.","60 ÷ 20 = 3: there are three « packets » of 20 minutes in an hour.","20 minutes = 1/3 of an hour.","1/4 hour = 15 min, 1/3 hour = 20 min, 1/2 hour = 30 min: the trio to know!"]},
"m2e14":{titre:"The vegetable-patch seeds",unit:"seeds",histoire:"The Valley gardener has a packet of 30 sunflower seeds. She decides to plant 2/5 of them today, before the rain.",
 q:"How many seeds does she plant? (Work out 2/5 of 30.)",
 indice:"Divide 30 into 5 parts, then take 2 parts.",
 etapes:["1/5 of 30 = 30 ÷ 5 = 6.","2/5 is twice that: 2 × 6 = 12 seeds.","« Divide by the bottom, multiply by the top » — the method always works!"]},
"m2e15":{titre:"The philosopher's pie",histoire:"The Valley philosopher cuts his pie into 3 slices and eats all three. He declares: « I ate 3/3 of the pie, that is… the whole pie! »",
 q:"Is he right: is 3/3 really a whole?",
 justif:["Yes: 3 slices out of 3 slices is everything — 3/3 = 1 whole pie.","No: 3/3 is three pieces, so less than a whole pie."],
 indice:"If he takes ALL the slices he cut, what's left on the plate?",
 etapes:["The pie is cut into 3 slices; he eats all 3.","3 slices out of 3 = the whole pie: 3/3 = 1.","Likewise 4/4 = 1, 8/8 = 1, 100/100 = 1.","When the top equals the bottom, the fraction is worth exactly 1 whole."]},
"m2e16":{titre:"The lavender field",unit:"plants",histoire:"The Valley has a field of 100 lavender plants. A quarter of the field must be harvested today to prepare soaps for the market.",
 q:"How many lavender plants need harvesting? (1/4 of 100.)",
 indice:"A quarter means dividing by 4.",
 etapes:["1/4 of 100 = 100 ÷ 4 = 25.","25 lavender plants need harvesting.","Remember: 1/4 of 100 = 25 — that's also why 25% means « a quarter »!"]},
"m2e17":{titre:"The pizza duel",histoire:"At the gourmand contest, Lou eats 2/3 of a pizza and Sam eats 3/4 of an identical pizza. The judges must decide who ate the most!",
 q:"Who ate more pizza?",choices:["Lou (2/3)","Sam (3/4)","They're tied","Impossible to compare"],
 indice:"Look instead at what's LEFT for each: 1/3 for Lou, 1/4 for Sam. Which leftover is smaller?",
 etapes:["Trick: let's compare the leftovers. Lou leaves 1/3, Sam leaves 1/4.","1/4 < 1/3: Sam leaves less… so he ate more!","In twelfths: 2/3 = 8/12 and 3/4 = 9/12 → Sam wins, confirmed.","Comparing the leftovers is often faster than converting everything."]},
"m2e18":{titre:"The class photo",acc:["4/10","2/5"],histoire:"In the Valley class photo, there are 10 pupils: 6 girls and the rest boys. The photographer notes the proportions in his book.",
 q:"What fraction of the class are boys? (Answer as a fraction, for example 3/10.)",
 indice:"How many boys out of how many pupils in total?",
 etapes:["Boys: 10 − 6 = 4.","They make up 4 pupils out of 10: 4/10 of the class.","4/10 simplifies to 2/5 (divide top and bottom by 2).","Both are correct: 4/10 = 2/5!"]},
"m2e19":{titre:"The orchard's two halves",acc:["8/8","1","1 pie","a whole pie"],histoire:"Grandma Valley assembles her famous two-orchard pie: 3/8 apple on one side, 5/8 pear on the other. Her grandson looks at the dish, intrigued.",
 q:"What fraction of pie does this make altogether? (3/8 + 5/8)",
 indice:"All the parts are eighths: just add the numerators.",
 etapes:["3 eighths + 5 eighths = 8 eighths.","3/8 + 5/8 = 8/8… that is, the WHOLE pie!","When denominators are the same, just add the numerators.","8/8 = 1: the pie is complete, no gap and no leftover."]},
"m2e20":{titre:"The cat's nap",histoire:"The Valley cat sleeps half an hour on the sofa, then another quarter of an hour in the sun. Its owner works out its total nap time (a personal record to beat).",
 q:"1/2 hour + 1/4 hour, how many minutes is that?",choices:["35 minutes","40 minutes","45 minutes","60 minutes"],
 indice:"Convert to minutes: 1/2 h = 30 min, 1/4 h = 15 min.",
 etapes:["1/2 hour = 30 minutes.","1/4 hour = 15 minutes.","30 + 15 = 45 minutes of napping.","In fractions: 1/2 + 1/4 = 2/4 + 1/4 = 3/4 hour = 45 min. It all checks out!"]},
"m2e21":{titre:"The festival garland",unit:"m",histoire:"For the Valley festival, a 3.6-metre garland is unrolled. A third of the garland must decorate the front door, the rest will go on the stage.",
 q:"What length for the door, in metres? (1/3 of 3.6 m.)",
 indice:"3.6 is 36 tenths. And 36 ÷ 3?",
 etapes:["1/3 of 3.6 = 3.6 ÷ 3.","36 tenths ÷ 3 = 12 tenths = 1.2.","The door needs 1.2 m.","Check: 1.2 × 3 = 3.6 ✓ Fractions get along very well with decimals."]},
"m2e22":{titre:"The court of fractions",histoire:"At the Valley court, 2/3 and 3/4 are arguing over the title of « biggest fraction ». Judge Owl delivers her verdict in four steps… scattered by a gust of wind!",
 q:"Put the judge's reasoning back in order:",
 ordre:["I look for a common denominator: 12 works for both 3 and 4.","I convert: 2/3 = 8/12.","I convert: 3/4 = 9/12.","9/12 > 8/12: the biggest fraction is 3/4!"],
 indice:"To compare fractions, we first write them with the same denominator.",
 etapes:["We can only properly compare parts of the same size: hence the common denominator 12.","2/3 = 8/12 and 3/4 = 9/12.","9 twelfths > 8 twelfths: 3/4 wins.","Same denominator = same « part size »: the comparison becomes obvious."]},
"m2e23":{titre:"The snack-time bet",histoire:"At snack time, Nino claims: « 1/4 of my 8 biscuits is exactly as much as 1/2 of my sister's 4 biscuits! » His sister frowns, ready to recount.",
 q:"Is Nino right?",
 justif:["Yes: 1/4 of 8 = 2 and 1/2 of 4 = 2. Two biscuits each!","No: 1/2 is bigger than 1/4, so his sister definitely has more."],
 indice:"Calculate each share: 8 ÷ 4 = ? and 4 ÷ 2 = ?",
 etapes:["1/4 of 8 = 8 ÷ 4 = 2 biscuits.","1/2 of 4 = 4 ÷ 2 = 2 biscuits.","A perfect tie: Nino is right!","A small fraction of a big number can equal a big fraction of a small number."]},
"m2e24":{titre:"The explorer's water bottle",unit:"cl",histoire:"The Valley's last riddle! Your water bottle is filled to 3/4 and holds exactly 60 cl of Valley fruit juice.",
 q:"What is the total capacity of the bottle, in centilitres?",
 indice:"If 3/4 is worth 60 cl, what is 1/4 worth? And so 4/4?",
 etapes:["3/4 = 60 cl, so 1/4 = 60 ÷ 3 = 20 cl.","The whole bottle (4/4) = 4 × 20 = 80 cl.","Check: 3/4 of 80 = 60 ✓","Going from the fraction back to the whole: the reasoning of great explorers!"]}
});

/* ================== TRADUCTIONS ANGLAISES : 6e Monde 3 · The Great Market (24 exercices) ================== */
Object.assign(TRAD_EN,{
"m3e1":{titre:"The morning croissants",unit:"£",histoire:"First morning at the Great Market! At the baker's stall: « 3 croissants for £3.60. » Your family wants 5, and the baker tests you: « Work out the price yourself! »",
 q:"How much do 5 croissants cost?",
 indice:"First find the price of ONE croissant: 3.60 ÷ 3.",
 etapes:["Price of one croissant: 3.60 ÷ 3 = £1.20.","Price of 5 croissants: 5 × 1.20 = £6.","That's the « go via the unit » rule: it works for every price at the market!"]},
"m3e2":{titre:"The Market treasure map",histoire:"A trader sells you an old map: « The treasure is 7 cm from here on the map. The scale reads: 1 cm on the map = 2 km in reality. »",
 q:"How far away is the treasure in reality?",choices:["7 km","9 km","14 km","72 km"],
 indice:"Each centimetre on the map is worth 2 km. There are 7 of them…",
 etapes:["1 cm on the map represents 2 km in real life.","7 cm therefore represents 7 × 2 = 14 km.","Map scales are proportional situations: everything is multiplied by the same number."]},
"m3e3":{titre:"The bike delivery girl",unit:"km",histoire:"Sacha delivers the Market's orders by bike. She always rides at the same pace: 12 km in one hour. Today, her round will last 2 hours and a half.",
 q:"What distance will she cover in 2 h 30?",
 indice:"Split up the time: 2 hours, then half an hour. How many km for each part?",
 etapes:["In 1 h: 12 km, so in 2 h: 24 km.","In 1/2 h: half of 12, that's 6 km.","Total: 24 + 6 = 30 km.","Splitting time into simple chunks is THE technique for speed calculations."]},
"m3e4":{titre:"The great festival soup",unit:"g",histoire:"The Market cook prepares his famous pumpkin soup. His recipe for 6 people needs 300 g of pumpkin. Tonight, 9 guests are expected!",
 q:"What mass of pumpkin does he need, in grams?",
 indice:"Go via 3 people: that's half of 6, and 9 = 6 + 3.",
 etapes:["For 6 people: 300 g. So for 3 people (half): 150 g.","9 people = 6 + 3 → 300 + 150 = 450 g.","Another route: per person, 300 ÷ 6 = 50 g, and 9 × 50 = 450 g. Two roads, same summit!"]},
"m3e5":{titre:"The halfway-through piggy bank",histoire:"You fall for a star-shaped lamp at £80. The seller smiles: « For you, half price: I'll take off 50%! »",
 q:"How much will you pay for the lamp?",choices:["£30","£40","£50","£75"],
 indice:"50% is 50 out of 100… in other words, half.",
 etapes:["50% = 50/100 = 1/2.","50% of £80 = 80 ÷ 2 = £40.","The discount is £40, and the price to pay is 80 − 40 = £40.","Here both are the same — only because the discount is 50%!"]},
"m3e6":{titre:"The hatter's sale",unit:"£",histoire:"The hatter's sign reads: « BIG SALE: −10% on everything! » The explorer's hat you want costs £250. You want to know the discount amount before negotiating.",
 q:"How much is a 10% discount on £250?",
 indice:"10% = 10/100 = one tenth. Taking a tenth means dividing by 10.",
 etapes:["10% of a number is that number divided by 10.","250 ÷ 10 = 25: the discount is £25.","Golden trick: starting from 10%, you can find everything else (20% = double, 5% = half…)."]},
"m3e7":{titre:"The stationer's reasoning",histoire:"At the stationery stall: 2 fountain pens cost £3. Your friend states: « So 4 pens will cost £6. »",
 q:"Is your friend right?",
 justif:["Yes: 2 times more pens, so 2 times more expensive. The price is proportional to the quantity.","No: you can never guess a price without a label."],
 indice:"4 pens is 2 times 2 pens. Does the price follow the same path?",
 etapes:["4 pens = 2 × (2 pens).","The price follows: 2 × £3 = £6.","The price is proportional to the quantity (no « bundle » deal), so your friend is right.","Doubling the quantity doubles the price: that's the heart of proportionality."]},
"m3e8":{titre:"The growth potion trap",histoire:"A potion seller spins you a tale: « Look at this little girl: at 10 years old, she's 140 cm tall. Thanks to my potion, at 20 she'll be double: 280 cm! It's mathematical! »",
 q:"Is her reasoning correct?",
 justif:["Yes: 2 times more years, so 2 times more centimetres.","No: height isn't proportional to age — otherwise grandparents would be giants!"],
 indice:"Apply the same reasoning to an 80-year-old granny… How tall would she be? Is that believable?",
 etapes:["If height and age were proportional, at 80 you'd be 8 × 140 = 11.20 m tall!","Growth slows down then stops: height is NOT proportional to age.","280 cm = 2.80 m, taller than the world record…","A maths reflex: before applying proportionality, ask if it makes sense."]},
"m3e9":{titre:"The apple seller's scales",histoire:"« 5 kg of apples: £8 », announces the sign. A customer only wants 3 kg. The seller explains how he works out the price, but a gust of wind mixed up his steps!",
 q:"Put the reasoning back in the right order:",
 ordre:["I first look for the price of 1 kg of apples.","I calculate 8 ÷ 5 = £1.60 per kilo.","I multiply by 3: 1.60 × 3 = £4.80.","3 kg of apples cost £4.80."],
 indice:"His method goes via the price of ONE kilo (the unit), before multiplying.",
 etapes:["We can't easily go from 5 kg to 3 kg… but we can go via 1 kg!","8 ÷ 5 = £1.60 per kilo, then 1.60 × 3 = £4.80.","That's the « rule of three »: go down to the unit, then back up."]},
"m3e10":{titre:"The four-seasons coat",unit:"£",histoire:"The four-seasons coat costs £60. Today, festival day, the tailor offers a 25% discount: « A quarter of the price, gone, miss! »",
 q:"How much will you pay for the coat, in pounds?",
 indice:"25% = 1/4. First work out the discount, then take it off the price.",
 etapes:["25% of £60 = 60 ÷ 4 = £15: that's the discount.","Price paid: 60 − 15 = £45.","Careful reading the question: it asked for the price PAID, not the discount. Word problems love this little trap!"]},
"m3e11":{titre:"The strawberry war",histoire:"Two strawberry stalls compete. Stall A: « 1.5 kg for £4.50 ». Stall B: « 2 kg for £5.60 ». The crowd hesitates… it's up to you to decide!",
 q:"Which stall sells its strawberries the cheapest?",choices:["Stall A","Stall B","They're the same price","Can't be compared"],
 indice:"Compare what's comparable: work out the price of 1 kg at each stall.",
 etapes:["Stall A: 4.50 ÷ 1.5 = £3 per kilo.","Stall B: 5.60 ÷ 2 = £2.80 per kilo.","2.80 < 3: Stall B is cheaper.","To compare offers, always bring them to the same unit (here, price per kilo — just like in the supermarket!)."]},
"m3e12":{titre:"The Great Market fountain",unit:"min",histoire:"The Market's final challenge: the great fountain (600 litres) must be filled for tonight's show. The fountain keeper turns on his tap and times it: 15 litres flow in 3 minutes.",
 q:"How long will it take to fill the fountain, in minutes?",
 indice:"Two possible routes: litres per minute (15 ÷ 3), or « how many times does 15 go into 600? »",
 etapes:["Flow rate: 15 ÷ 3 = 5 litres per minute.","Time: 600 ÷ 5 = 120 minutes.","120 minutes = 2 hours: the show can begin!","Another route: 600 ÷ 15 = 40 « packets » of 3 minutes → 40 × 3 = 120 min. Same answer ✓"]},
"m3e13":{titre:"The back-to-school notebooks",unit:"£",histoire:"At the Great Market's stationery stall: « 4 notebooks for £10 ». For the new school term, you need exactly 7 notebooks.",
 q:"How much will the 7 notebooks cost?",
 indice:"First find the price of ONE notebook: 10 ÷ 4.",
 etapes:["Price of one notebook: 10 ÷ 4 = £2.50.","Price of 7 notebooks: 7 × 2.50 = £17.50.","Trick: 7 × 2.50 = 7 × 2 + 7 × 0.50 = 14 + 3.50 = £17.50."]},
"m3e14":{titre:"The Great Market's map",histoire:"The map displayed at the entrance reads: « Scale 1/1,000 » — 1 cm on the map represents 1,000 cm in real life. The fountain is 5 cm from the entrance on the map.",
 q:"How far away is the fountain in real life?",choices:["5 m","50 m","500 m","5 km"],
 indice:"5 cm × 1,000 = 5,000 cm. Convert to metres (1 m = 100 cm).",
 etapes:["Real distance: 5 × 1,000 = 5,000 cm.","5,000 cm = 5,000 ÷ 100 = 50 m.","The fountain is 50 metres away.","A scale is a multiplication… often followed by a unit conversion!"]},
"m3e15":{titre:"The delivery boy's tip",unit:"£",histoire:"The rug seller is delighted: her takings for the day are £45. She decides to give 20% of it to her young delivery boy who cycled all day.",
 q:"How much does the delivery boy receive? (20% of £45.)",
 indice:"First work out 10% (easy: ÷ 10), then double it.",
 etapes:["10% of 45 = £4.50.","20% is double: 2 × 4.50 = £9.","The delivery boy receives £9.","The 10% method lets you work out almost any percentage in your head!"]},
"m3e16":{titre:"The oak at the end of the market",histoire:"The knife-sharpener claims: « This oak was 2 m tall at 10 years old. It's 50 now, so it's 5 times taller: 10 metres! It's proportional, young lady! »",
 q:"Is his reasoning correct?",
 justif:["Yes: 5 times older, so 5 times taller.","No: a tree's growth slows with age — height isn't proportional to time."],
 indice:"And at 500 years old, would it be 100 m tall? Taller than the Eiffel Tower is wide… um, believable?",
 etapes:["If it were proportional, at 500 years old the oak would be 100 m tall — no oak reaches that!","Trees grow fast when young, then slower and slower.","Proportional reasoning doesn't apply to growth.","Always ask: « does doubling one thing really double the other? »"]},
"m3e17":{titre:"The express stagecoach",unit:"km",histoire:"The express stagecoach connects the markets at a constant speed of 90 km/h on the main road. The next market is only half an hour's ride away.",
 q:"What distance does the stagecoach cover in 1/2 hour?",
 indice:"In 1 hour: 90 km. In half an hour: half of that.",
 etapes:["At 90 km/h, we cover 90 km in 1 hour.","In 1/2 hour: 90 ÷ 2 = 45 km.","Constant speed = proportionality between time and distance."]},
"m3e18":{titre:"The battle of the eggs",histoire:"Two farmers compete at the Great Market. Farm East: « 6 eggs for £1.80 ». Farm West: « 10 eggs for £2.80 ». It's up to you to advise the customers!",
 q:"Which offer is the best value?",choices:["6 eggs at £1.80","10 eggs at £2.80","They're the same","Can't be compared"],
 indice:"Work out the price of ONE egg at each farm.",
 etapes:["East: 1.80 ÷ 6 = £0.30 per egg.","West: 2.80 ÷ 10 = £0.28 per egg.","0.28 < 0.30: Farm West is cheaper.","Price per unit is the smart shopper's secret weapon."]},
"m3e19":{titre:"The market pancake stall",unit:"eggs",histoire:"The recipe displayed at the pancake stall: « For 8 pancakes: 2 eggs ». Today is festival day, and the pancake maker must prepare 20 pancakes at once!",
 q:"How many eggs does he need for 20 pancakes?",
 indice:"Go via 4 pancakes (half of 8)… or notice that 20 = 8 + 8 + 4.",
 etapes:["For 8 pancakes: 2 eggs → for 4 pancakes: 1 egg.","20 pancakes = 8 + 8 + 4 → 2 + 2 + 1 = 5 eggs.","Breaking it into simple chunks (halves, doubles) saves a lot of calculating!"]},
"m3e20":{titre:"The bridge toll",unit:"£",histoire:"To enter the Great Market, carts pay a toll of 5% of their cargo's value. Your cart carries £200 worth of goods.",
 q:"How much toll will you pay? (5% of £200.)",
 indice:"10% of 200 = 20. And 5% is half of 10%.",
 etapes:["10% of £200 = £20.","5% = half of 10%: 20 ÷ 2 = £10.","The toll is £10.","10% then half: the combo that works out 5% in two seconds."]},
"m3e21":{titre:"The baker's shop",histoire:"The Great Market's baker sells 7 baguettes for £8.40. A customer only wants 4. He explains his calculation, but flour has covered the order of his steps!",
 q:"Put the baker's calculation back in order:",
 ordre:["I look for the price of ONE baguette.","I calculate 8.40 ÷ 7 = £1.20.","I multiply by 4: 1.20 × 4 = £4.80.","The 4 baguettes cost £4.80."],
 indice:"Going via the unit: divide first, multiply after.",
 etapes:["We don't go directly from 7 to 4: we go via 1 baguette.","8.40 ÷ 7 = £1.20, then 1.20 × 4 = £4.80.","The rule of three, once again — the market's best friend!"]},
"m3e22":{titre:"The sale poster",histoire:"On the Market's big poster: « SALE: 75% of stock already sold! » The seller asks you, teasingly: « Do you know what fraction that is? »",
 q:"75% is what fraction?",choices:["1/2","2/3","3/4","7/5"],
 indice:"75% = 75/100. Simplify this fraction (divide by 25).",
 etapes:["75% = 75/100.","75 ÷ 25 = 3 and 100 ÷ 25 = 4: so 75/100 = 3/4.","75% = 3/4. Remember it alongside 50% = 1/2 and 25% = 1/4!"]},
"m3e23":{titre:"The pedlar's journey",unit:"cm",histoire:"The pedlar plans his route on a map with the scale « 1 cm = 5 km ». The next village is a 35 km walk away.",
 q:"What distance does this represent on the map, in cm?",
 indice:"This time we go from real life to the map: how many times does 5 km fit into 35 km?",
 etapes:["Each cm represents 5 km.","35 ÷ 5 = 7: 7 cm are needed on the map.","This is the reverse of usual: we DIVIDE instead of multiplying. Always check the direction!"]},
"m3e24":{titre:"The grand evening coat",unit:"£",histoire:"The Great Market's final challenge: the sumptuous grand evening coat costs £90. The tailor, moved by your journey, grants you an exceptional 30% discount.",
 q:"How much will you pay for the coat?",
 indice:"Step 1: 10% of 90. Step 2: the discount (× 3). Step 3: the price paid.",
 etapes:["10% of £90 = £9.","30% = 3 × 9 = £27 discount.","Price paid: 90 − 27 = £63.","And there you go: a full percentage calculation, no calculator. The Market bows to you!"]}
});

/* ================== TRADUCTIONS ANGLAISES : 6e Monde 4 · The Geometric Cities (24 exercices) ================== */
Object.assign(TRAD_EN,{
"m4e1":{titre:"The architect's vegetable patch",histoire:"The Cities' chief architect welcomes you to her garden: a rectangular vegetable patch 5 m long and 3 m wide. She wants to surround it entirely with a small wooden fence.",
 q:"What length of fencing should she buy?",choices:["8 m","15 m","16 m","30 m"],
 indice:"The fence goes all the way round: that's the perimeter. Add up the 4 sides.",
 etapes:["Going round the rectangle (perimeter) = length + width + length + width.","P = 5 + 3 + 5 + 3 = 16 m. (Or faster: (5 + 3) × 2.)","Careful: 5 × 3 = 15 would give the AREA (the surface), not the way round!"]},
"m4e2":{titre:"The palace carpet",unit:"m²",histoire:"The Cities' palace orders a rectangular carpet for the throne room: 7 m long by 4 m wide. The weaver charges according to the carpet's surface.",
 q:"What is the area of the carpet, in m²?",
 indice:"The area of a rectangle = length × width. Imagine the carpet in a grid of 1 m squares.",
 etapes:["Area of a rectangle = length × width.","7 × 4 = 28 m².","Imagine 4 rows of 7 squares of 1 m by 1 m: that's indeed 28.","Perimeter = the way round (in m); area = the surface (in m²). Two very different ideas!"]},
"m4e3":{titre:"The glazier's sign",histoire:"The Cities' glazier makes giant-letter signs. He only keeps letters with a vertical line of symmetry: folded in half along an upright line, the two halves match perfectly.",
 q:"Which of these letters has a vertical line of symmetry?",choices:["A","F","G","J"],
 indice:"Imagine each letter folded in half along a vertical line through the middle. For which do the two halves line up?",
 etapes:["Mentally fold each letter along a central vertical line.","The A has two identical halves on either side: it has a vertical line of symmetry.","F, G and J don't: their left and right halves are different.","Other vertically symmetrical letters: H, M, O, T, U, V, W, X, Y."]},
"m4e4":{titre:"The royal portrait frame",unit:"cm",histoire:"The royal framer makes a perfectly square frame for the queen's portrait. He used exactly 36 cm of gold trim to go all the way round.",
 q:"What is the length of one side of the frame, in cm?",
 indice:"A square has 4 identical sides. The full way round measures 36 cm…",
 etapes:["The perimeter of a square = 4 × side.","We're looking for the side: 36 ÷ 4 = 9 cm.","Check: 9 + 9 + 9 + 9 = 36 ✓","Here we do the reverse of the perimeter calculation: it's a « backwards » problem."]},
"m4e5":{titre:"The games maker's dice",histoire:"The Cities' games maker shares a secret with you: « On a real dice, opposite faces ALWAYS add up to 7. » He places a dice on the table, face 3 showing on top.",
 q:"What number is hidden on the bottom face?",
 indice:"Top + bottom = 7. The top shows 3…",
 etapes:["Opposite faces of a dice total 7: 1↔6, 2↔5, 3↔4.","The face opposite the 3 is therefore 7 − 3 = 4.","Check it on a real dice at home: it works every time!"]},
"m4e6":{titre:"The delivery robot",histoire:"In the Cities, a little robot delivers parcels. It starts facing north. To avoid a fountain, it turns 3 times in a row, a quarter turn to the right each time.",
 q:"Which direction is the robot now facing?",choices:["North","South","East","West"],
 indice:"Follow the quarter turns one by one: north → east → south → …",
 etapes:["1st quarter turn right: north → east.","2nd quarter turn: east → south.","3rd quarter turn: south → west.","Trick: 3 quarter turns right = 1 quarter turn left. North → west, directly!"]},
"m4e7":{titre:"The trial of the quadrilaterals",histoire:"A great debate at the court of shapes! The square proudly declares: « I too am a rectangle! » The rectangle protests: « Impossible, your sides are all equal! » The judge asks you to decide.",
 q:"Is the square right: is a square also a rectangle?",
 justif:["Yes: it has 4 right angles, that's the definition of a rectangle. Its 4 equal sides are a bonus!","No: a rectangle must have a length different from its width."],
 indice:"What is the exact definition of a rectangle? Does the square satisfy it?",
 etapes:["Definition: a rectangle is a quadrilateral with 4 right angles.","The square does have 4 right angles: it satisfies the definition, so it is a rectangle.","It's a « special » rectangle, with the bonus of 4 equal sides.","Likewise, a square is also a special rhombus. Families of shapes nest inside each other!"]},
"m4e8":{titre:"The L-shaped mosaic",unit:"tiles",histoire:"The Cities' mosaic maker creates an L-shaped pattern: she started with a large rectangle of 5 tiles by 3, then removed a rectangular corner of 2 tiles by 1.",
 q:"How many tiles does her L-shaped mosaic have?",
 indice:"Calculate the tiles of the complete large rectangle, then take away the removed corner.",
 etapes:["Complete rectangle: 5 × 3 = 15 tiles.","Corner removed: 2 × 1 = 2 tiles.","L-shaped mosaic: 15 − 2 = 13 tiles.","For complicated shapes, go via simple rectangles that you add or remove."]},
"m4e9":{titre:"The great tower clock",histoire:"On the Cities' great tower, the clock strikes 3 o'clock exactly. The little hand points to 3, the big hand points to 12. The clockmaker asks you to describe the angle between the two hands.",
 q:"What angle do the hands form at 3:00 exactly?",choices:["An acute angle (less than 90°)","A right angle (exactly 90°)","An obtuse angle (more than 90°)","A straight angle (180°)"],
 indice:"From 12 to 3, the hand travels a quarter of the clock face. What angle matches a quarter turn?",
 etapes:["A full turn of the clock face = 360°.","From 12 to 3, that's a quarter turn: 360 ÷ 4 = 90°.","90° is exactly a right angle — like the corner of a sheet of paper.","At 6:00, the hands would make a straight angle (180°). Check it tonight!"]},
"m4e10":{titre:"The ramparts walk",unit:"m",histoire:"The citadel's ramparts form an L-shape: a rectangle of 8 m by 5 m with a rectangular corner cut out. The guard does his round along all the walls, including the two walls of the notch.",
 q:"What distance does he cover for one full round, in metres?",
 indice:"Slide (in your mind) the two small walls of the notch: the way round the L is the same as the way round the complete 8 m × 5 m rectangle!",
 etapes:["Magic trick: push the horizontal wall of the notch upward and the vertical wall to the right.","The shape becomes a complete rectangle of 8 m by 5 m, without changing the length of the way round.","Perimeter = (8 + 5) × 2 = 26 m.","Cutting out a rectangular corner does NOT change the perimeter… but it does change the area! Surprising, isn't it?"]},
"m4e11":{titre:"The builder's plan",histoire:"The Cities' builder must draw a perfectly square plaza with 4 cm sides on his plan. He knows the method by heart… but his instructions fell out of his notebook!",
 q:"Put the steps of constructing square ABCD in order:",
 ordre:["I draw a 4 cm segment AB with my ruler.","I draw the perpendicular to AB through A, and the one through B, with my set square.","On each perpendicular, I mark D and C at 4 cm from A and B.","I join D to C: ABCD is a square with 4 cm sides."],
 indice:"We always start with a base segment, then come the right angles, then the measurements.",
 etapes:["First the base: segment AB of 4 cm.","Then the right angles with the set square: the perpendiculars at A and B.","Then we mark off the 4 cm measurement to place D and C.","We close the shape. Ruler + set square = the winning duo for squares!"]},
"m4e12":{titre:"The ballroom's tiling",unit:"tiles",histoire:"The Cities' last project: tiling the ballroom, a rectangle 6 m by 4 m, with square tiles 50 cm on a side. The site manager awaits your calculation to place the order.",
 q:"How many tiles need ordering?",
 indice:"How many 50 cm tiles fit along a 6 m length? And along 4 m? (Reminder: 1 m = 100 cm.)",
 etapes:["50 cm is half a metre: 2 tiles are needed to make 1 m.","Along the 6 m length: 12 tiles. Along the 4 m width: 8 tiles.","Total: 12 × 8 = 96 tiles.","Another route: room area 24 m², one tile's area 0.25 m², and 24 ÷ 0.25 = 96 ✓"]},
"m4e13":{titre:"The king's square vegetable patch",unit:"m²",histoire:"The king of the Cities has a perfectly square vegetable patch built, 6 metres on a side. The royal gardener must order the right amount of compost, to the exact m².",
 q:"What is the area of the vegetable patch, in m²?",
 indice:"The area of a square = side × side.",
 etapes:["Area of a square = side × side.","6 × 6 = 36 m².","Not to be confused with the perimeter (4 × 6 = 24 m): the area fills, the perimeter surrounds!"]},
"m4e14":{titre:"The cube's skeleton",histoire:"The Cities' sculptor builds a giant cube from metal rods: one rod for each edge. He must place his order at the forge, without forgetting a single one.",
 q:"How many edges does a cube have?",choices:["6","8","12","24"],
 indice:"Count on a dice or a box: the top edges, the bottom edges, and the vertical ones.",
 etapes:["Top face: 4 edges. Bottom face: 4 edges.","There remain the 4 vertical edges linking the two faces.","4 + 4 + 4 = 12 edges.","Remember: a cube has 6 faces, 8 vertices and 12 edges."]},
"m4e15":{titre:"The museum's golden frame",unit:"cm... er, m",histoire:"The Cities' museum receives a rectangular painting. Its frame is 28 m all the way round, and the painting measures 9 m in length. The curator needs the width to prepare the wall.",
 q:"What is the width of the painting, in metres?",
 indice:"Perimeter = (length + width) × 2. So length + width = 28 ÷ 2.",
 etapes:["Half the perimeter: 28 ÷ 2 = 14 m = length + width.","Width = 14 − 9 = 5 m.","Check: (9 + 5) × 2 = 28 ✓","A « backwards » problem: we know the result, we're looking for an ingredient."]},
"m4e16":{titre:"The perfect crossroads",histoire:"In the Cities, two avenues cross forming perfectly right angles. The town planner declares: « At this crossroads, there are exactly 4 right angles. »",
 q:"Is she right: do two perpendicular lines form 4 right angles?",
 justif:["Yes: the crossing creates 4 corners, and they all measure 90°.","No: there are only 2 right angles, the other 2 are different."],
 indice:"Draw a cross « + »: count the corners around the centre.",
 etapes:["Around the crossing point, there are 4 sectors.","If one measures 90°, so do the others (a full turn is 360° = 4 × 90°).","Perpendicular = 4 right angles, not one fewer!"]},
"m4e17":{titre:"The illuminated sign",histoire:"The Cities' theatre sign displays illuminated digits. The decorator only keeps the digits with a line of symmetry — folded in half, the halves match up.",
 q:"Among these digits, which has a line of symmetry?",choices:["8","7","4","2"],
 indice:"Imagine each digit folded in half, either vertically OR horizontally.",
 etapes:["The 8 is made of two loops: folded vertically (and even horizontally), its halves match.","7, 4 and 2 have no line of symmetry at all.","0 and 3 (horizontal axis) are other symmetrical digits.","Symmetry is always tested by mental folding!"]},
"m4e18":{titre:"The triangular stained-glass window",unit:"dm",histoire:"The Cities' master glazier creates an equilateral-triangle stained-glass window — three perfectly equal sides. He uses exactly 27 dm of lead trim for the way round.",
 q:"What is the length of one side of the window, in dm?",
 indice:"Equilateral = 3 equal sides. The way round is 27 dm…",
 etapes:["Equilateral triangle: 3 identical sides.","27 ÷ 3 = 9 dm per side.","Check: 9 + 9 + 9 = 27 ✓","« Equi-lateral » = equal sides: the name says it all!"]},
"m4e19":{titre:"The triangular garden",unit:"m²",histoire:"A garden in the Cities is shaped like a right-angled triangle: the two sides forming the right angle measure 6 m and 8 m. The landscaper hints: « Imagine the complete rectangle… »",
 q:"What is the area of this garden, in m²?",
 indice:"A right-angled triangle is exactly HALF of a 6 m × 8 m rectangle.",
 etapes:["The complete 6 × 8 rectangle would have an area of 48 m².","The right-angled triangle is half of it: 48 ÷ 2 = 24 m².","That's why the area of a right-angled triangle = (side × side) ÷ 2.","Cutting and completing shapes: the geometer's great power."]},
"m4e20":{titre:"The cubic chest's net",histoire:"The Cities' carpenter draws the net of a cubic chest: the flat drawing that, once folded, will form the whole cube, with no gap and no overlap.",
 q:"How many squares must his net be made of?",choices:["4 squares","6 squares","8 squares","12 squares"],
 indice:"Each square in the net will become one face of the cube. How many faces does a cube have?",
 etapes:["A cube has 6 square faces.","The net must therefore have exactly 6 squares — arranged so they fold up without overlapping.","The famous « cross » of 6 squares is the best-known cube net… but there are 11 different ones!"]},
"m4e21":{titre:"The enlarged plaza",unit:"m",histoire:"The Cities' small square plaza measures 3 m on a side. The council decides to rebuild it by DOUBLING its side. The mason must plan the stone border that will go all the way round.",
 q:"What will the perimeter of the new plaza be, in metres?",
 indice:"New side: 3 × 2 = 6 m. And the perimeter of a square?",
 etapes:["New side: 6 m.","Perimeter: 4 × 6 = 24 m.","The old perimeter was 12 m: doubling the side doubled the perimeter.","(But careful: the area went from 9 to 36 m² — multiplied by 4!)"]},
"m4e22":{titre:"The cathedral rose window",histoire:"The cathedral architect must draw a perfect circle with a 4 cm radius for his rose window. His compass instructions fell off the scaffolding — put them back in order!",
 q:"Put the steps of the drawing in order:",
 ordre:["I mark a point O: this will be the centre of the circle.","I open my compass to 4 cm, measured on the ruler.","I place the point at O and turn the compass a full turn.","I get a circle with centre O and 4 cm radius."],
 indice:"First the centre, then the opening, then the drawing.",
 etapes:["The centre first: the whole circle depends on it.","The compass opening = the radius.","One full turn, without changing the opening: the circle is perfect.","Every point of the circle is exactly 4 cm from O — that's its definition!"]},
"m4e23":{titre:"The apprentice mason's bet",histoire:"The apprentice mason claims: « If you double the side of a square tile, its area doubles too. That's logical, everything doubles! »",
 q:"Is he right?",
 justif:["Yes: when the side doubles, everything doubles.","No: the area is multiplied by 4! A 2 cm square is 4 cm², a 4 cm square is 16 cm²."],
 indice:"Test it: a square with a 2 cm side → area? A square with a 4 cm side → area? Compare.",
 etapes:["Square with side 2: area = 2 × 2 = 4 cm².","Square with side 4: area = 4 × 4 = 16 cm².","16 = 4 × 4: the area was multiplied by 4, not 2!","Area grows « squared »: doubling the side quadruples the surface. A very classic trap dodged!"]},
"m4e24":{titre:"The ballroom to repaint",unit:"pots",histoire:"The Cities' last project: repainting the ballroom ceiling, a rectangle 5 m by 4 m. One pot of gold paint covers exactly 5 m². The painter awaits your order.",
 q:"How many pots need ordering?",
 indice:"First the ceiling's area, then the number of pots.",
 etapes:["Ceiling area: 5 × 4 = 20 m².","Number of pots: 20 ÷ 5 = 4 pots.","Area then division: a two-stage problem, just like a real building site."]}
});

/* ================== TRADUCTIONS ANGLAISES : 6e Monde 5 · The Forest of Puzzles (24 exercices) ================== */
Object.assign(TRAD_EN,{
"m5e1":{titre:"The doubling mushrooms",histoire:"At the entrance to the Forest grows a row of enchanted mushrooms bearing the numbers 2, 4, 8, 16… The next one is still underground, and the gardener elf has forgotten its number!",
 q:"What number does the next mushroom carry?",
 indice:"Look at how we go from one mushroom to the next: 2 → 4 → 8 → 16…",
 etapes:["From 2 to 4: × 2. From 4 to 8: × 2. From 8 to 16: × 2.","Each mushroom is double the one before.","The next one: 16 × 2 = 32.","Faced with a sequence, always look for the « machine » that turns one number into the next."]},
"m5e2":{titre:"The old oak's staircase",histoire:"A spiral staircase climbs up inside the old oak tree. Its steps carry the numbers 1, 1, 2, 3, 5, 8… The next step is hidden by the leaves. The squirrel whispers: « The secret is in the previous steps… »",
 q:"What number does the next step carry?",
 indice:"Add the last two steps: 1+1=2, 1+2=3, 2+3=5…",
 etapes:["Each number is the sum of the TWO before it.","1+1=2, 1+2=3, 2+3=5, 3+5=8… ✓","The next step: 5 + 8 = 13.","You've just discovered the famous Fibonacci sequence — found in pine cones and sunflowers!"]},
"m5e3":{titre:"The three guardians",histoire:"Three Forest guardians — Zoe, Ines and Maya — each have an animal: a cat, a dog or a rabbit. You learn that: Ines is allergic to cats. Maya walks her animal on a lead every evening: it's the dog.",
 q:"Who has the cat?",choices:["Zoe","Ines","Maya","Impossible to know"],
 indice:"Work by elimination: who CAN'T have the cat?",
 etapes:["Maya has the dog (she walks it on a lead).","Ines is allergic to cats: she can't have the cat. So she has the rabbit.","Only Zoe is left for the cat.","This is deduction by elimination: cross off the impossibles until only one solution remains."]},
"m5e4":{titre:"The absent-minded shepherd's sheep",unit:"sheep",histoire:"The clearing's shepherd tells his misadventure: « I had 17 sheep. During the storm, all of them ran off, except 9. » He looks at you, distraught: « How many do I have left? »",
 q:"How many sheep does the shepherd have left?",
 indice:"Read very slowly: « all EXCEPT 9 ran off ». So who stayed?",
 etapes:["The trap: you want to calculate 17 − 9 = 8… but read carefully!","« All except 9 ran off » means exactly: 9 sheep did NOT leave.","So he has 9 sheep left. No calculation was needed!","Forest lesson: reading the question carefully beats calculating fast."]},
"m5e5":{titre:"The well snail",unit:"days",histoire:"A snail has fallen to the bottom of a 10-metre well. Each day it climbs 3 metres; but each night, it slips back down 2 metres. The snail calls out: « In how many days will I get out? »",
 q:"After how many days does the snail get out of the well?",
 indice:"Careful: the day it reaches the top, it doesn't slip back down anymore! Track its height day by day.",
 etapes:["Each full day (climb + night), it gains 3 − 2 = 1 metre.","End of night 7: it's at 7 metres.","On day 8, it climbs 3 m: 7 + 3 = 10 m → it's OUT, no more night-time slipping!","Answer: 8 days (not 10). The classic trap: forgetting that the last climb is enough."]},
"m5e6":{titre:"The fairy who speaks of the future",unit:"years",histoire:"A little fairy stops you on the path: « Guess my age! In 6 years, I'll be exactly double my age today. »",
 q:"How old is the fairy today?",
 indice:"Try ages: if she's 4, in 6 years she'll be 10… is that double 4? Keep testing!",
 etapes:["Let's test: 5 years old → in 6 years: 11. Double 5 = 10. Missed.","6 years old → in 6 years: 12. Double 6 = 12. Got it!","The fairy is 6 years old. Going from her age to double it means adding her age: so her age = 6.","Trying values and adjusting is a real mathematician's method!"]},
"m5e7":{titre:"The clearing's scales",histoire:"At the heart of the Forest stands an old stone scale. You observe: 2 apples weigh exactly as much as 6 clementines. The owl asks you: « So, one single apple… »",
 q:"An apple weighs as much as how many clementines?",choices:["2 clementines","3 clementines","4 clementines","6 clementines"],
 indice:"If 2 apples = 6 clementines, split each pan in two…",
 etapes:["2 apples ⟺ 6 clementines.","We divide each side by 2: 1 apple ⟺ 3 clementines.","Scales stay balanced if you divide both pans the same way — that's the start of equations!"]},
"m5e8":{titre:"The elves' party",unit:"handshakes",histoire:"Four elves meet up for the Forest party. Very polite, they all shake hands: each elf shakes hands once with each of the others.",
 q:"How many handshakes are exchanged altogether?",
 indice:"Call them A, B, C, D and list the pairs: A-B, A-C… careful, A-B is the same as B-A!",
 etapes:["Let's list the pairs: A-B, A-C, A-D, B-C, B-D, C-D.","That's 6 handshakes.","Why not 4 × 3 = 12? Because each handshake would be counted twice (A-B and B-A): 12 ÷ 2 = 6.","Making an ordered list is the best way to miss nothing and count nothing twice."]},
"m5e9":{titre:"The druidess's necklace",histoire:"The druidess threads beads in a very precise ritual order: ▲ ● ● ▲ ● ● ▲ … She stops and hands you the string: « Your turn! Which bead comes now? »",
 q:"What is the next bead?",choices:["▲ a triangle","● a circle","A new shape","Impossible to predict"],
 indice:"Look for the « packet » that repeats from the start of the necklace.",
 etapes:["The repeating pattern is: ▲ ● ● (a packet of 3 beads).","The necklace: ▲●● | ▲●● | ▲ … The last packet has just started with ▲.","The two circles of the packet are missing: the next bead is ●.","Spotting the repeated pattern even lets you predict the 100th bead: 100 = 33 packets + 1 → a ▲!"]},
"m5e10":{titre:"The hedgehog family riddle",unit:"children",histoire:"A young hedgehog poses her family's riddle: « I have as many brothers as sisters. But my brother Eric has twice as many sisters as brothers. »",
 q:"How many children are there in the hedgehog family?",
 indice:"Test it! Try 4 girls and 3 boys: the hedgehog would have 3 sisters and 3 brothers… and Eric?",
 etapes:["Let's test 4 girls and 3 boys.","The young hedgehog (one of the girls): 3 sisters and 3 brothers → « as many brothers as sisters » ✓","Eric (one of the boys): 4 sisters and 2 brothers → « twice as many sisters » ✓","4 + 3 = 7 children. The secret: the one speaking never counts themselves!"]},
"m5e11":{titre:"The Forest Zorgs",histoire:"The logician owl states two absolutely certain facts: « All Forest Zorgs are green. Now, Bip is green. » Then he proudly concludes: « So Bip is a Zorg! »",
 q:"Is the owl's conclusion correct?",
 justif:["Yes: Bip is green and Zorgs are green, it all fits.","No: other creatures can be green without being Zorgs — a frog, for example!"],
 indice:"Replace « Zorg » with « frog »: all… hmm, and what if Bip were a cactus?",
 etapes:["« All Zorgs are green » means: Zorg → necessarily green.","But that does NOT stop other beings from being green too: frogs, cacti, dragons…","Bip is green, fine, but nothing proves he's a Zorg. The conclusion is false.","This is a very famous logic trap: the « if… then » arrow doesn't reverse!"]},
"m5e12":{titre:"The three lanterns",histoire:"Deep in the Forest, a cabin. Downstairs, 3 switches; upstairs, in the attic, a single lantern — invisible from below. You can only go up to the attic ONCE. The owl challenges you to find, for certain, which switch lights the lantern.",
 q:"What strategy is guaranteed to find the right switch?",choices:["I turn on the 1st for a few minutes then switch it off, turn on the 2nd, and go up to touch the bulb.","I turn on all 3 at once and go up to look.","I turn one on at random: I have a one-in-three chance.","It's impossible with a single visit."],
 indice:"A bulb that has just been lit keeps a clue… even when off. Which one? (Think of heat!)",
 etapes:["Turn on the 1st switch for 5 minutes, then switch it off. Turn on the 2nd. Go up.","Lantern lit → it's the 2nd switch.","Lantern off but WARM → it was the 1st.","Lantern off and cold → it's the 3rd. Three possible cases, three different answers: the trick is using a second piece of information (heat), not just light!"]},
"m5e13":{titre:"The stepping stones of the torrent",histoire:"To cross the torrent, you jump from stone to stone. They carry the numbers 1, 4, 9, 16… The next one is hidden under the foam. The beaver whispers: « Think of a number multiplied by itself… »",
 q:"What number does the next stone carry?",
 indice:"1 = 1×1, 4 = 2×2, 9 = 3×3, 16 = 4×4… and then?",
 etapes:["These are « square » numbers: 1×1, 2×2, 3×3, 4×4…","The next one is 5 × 5 = 25.","They're called square numbers because you can draw them as squares of dots!"]},
"m5e14":{titre:"The magic henhouse",unit:"eggs",histoire:"In the clearing, 3 hens lay 3 eggs together in 3 days (yes, they're very synchronised hens). The farmer has just enlarged his henhouse: he now has 6 hens.",
 q:"How many eggs do his 6 hens lay in 3 days?",
 indice:"If 3 hens give 3 eggs in 3 days… double the hens, over the same time, gives…?",
 etapes:["3 hens → 3 eggs in 3 days.","6 hens is 2 times more hens, over the SAME time: 2 × 3 = 6 eggs.","The trap was answering too fast with « 6 eggs in 6 days » or some other mix-up: only the number of hens changed!"]},
"m5e15":{titre:"The druid's calendar",histoire:"The Forest druid speaks in riddles: « Meet me the day after the day before Tuesday. » The owl rolls his eyes: another one of his puzzles…",
 q:"What day is the druid asking to meet you?",choices:["Monday","Tuesday","Wednesday","Sunday"],
 indice:"Break it down: the day before Tuesday is Monday. And the day after Monday?",
 etapes:["The day before Tuesday = Monday.","The day after Monday = Tuesday.","« The day after the day before » brings you right back to the start: Tuesday!","Breaking down tricky sentences piece by piece: the key to riddles."]},
"m5e16":{titre:"The sock drawer",unit:"socks",histoire:"In the pitch-dark cabin, a drawer holds red socks and green socks, all mixed up. Impossible to see the colours! You want to be SURE of pulling out two socks of the same colour.",
 q:"How many socks must you take, at minimum, to be certain of having a matching pair?",
 indice:"Imagine the worst luck: the first two socks are different colours. And the third?",
 etapes:["With 2 socks, no guarantee: one red and one green, missed.","Take 3: there are only 2 colours, so at least two of the three must match!","This is the famous « pigeonhole principle »: 3 socks for 2 colours → a matching pair, guaranteed.","Reasoning about the WORST case: the mark of a true logician."]},
"m5e17":{titre:"The great oak's months",histoire:"The great talking oak, who has seen centuries pass, claims: « In a year, exactly 7 months have 31 days. »",
 q:"Is the great oak telling the truth?",
 justif:["Yes: January, March, May, July, August, October and December — 7 months of 31 days.","No: months of 31 days alternate one in two, there are 6 of them."],
 indice:"Count on your knuckles: the « bumps » are the 31-day months… and July-August follow each other!",
 etapes:["31-day months: January, March, May, July, AUGUST, October, December.","That's indeed 7 months (July and August follow each other, hence the surprise).","The others: 4 months of 30 days, and February (28 or 29).","The knuckle trick lets you find them all!"]},
"m5e18":{titre:"The fox sisters' ages",unit:"years",histoire:"Two fox sisters guard the Forest bridge. The elder announces: « Between the two of us, we're 20 years old. And I'm exactly 4 years older than my sister. » She looks at you: « What's MY age? »",
 q:"What is the elder sister's age?",
 indice:"Try pairs that make 20 with a gap of 4: 11 and 9? 12 and 8?",
 etapes:["Let's test: 12 + 8 = 20, and 12 − 8 = 4 gap. ✓","The elder is 12, her sister is 8.","Another route: take away the gap (20 − 4 = 16), share (8), give the gap back to the elder (8 + 4 = 12).","Sum and difference: a great classic of riddles… and of equations to come in secondary school!"]},
"m5e19":{titre:"The race of the three hares",histoire:"Three hares — Aro, Bali and Cambo — finish their great Forest race. You learn that: Bali finished ahead of Aro. And Cambo finished behind Aro.",
 q:"Who finished second?",choices:["Aro","Bali","Cambo","Impossible to know"],
 indice:"Line them up: Bali ahead of Aro, and Aro ahead of Cambo…",
 etapes:["Bali is ahead of Aro: Bali … Aro.","Cambo is behind Aro: Bali, Aro, Cambo.","Full order: Bali 1st, Aro 2nd, Cambo 3rd.","Drawing the line on scrap paper makes these riddles obvious!"]},
"m5e20":{titre:"The giant water lily",unit:"days",histoire:"On the Forest pond grows a magic water lily: each day, its surface DOUBLES. In exactly 10 days, it covers the whole pond. The frog asks you THE trick question…",
 q:"After how many days did the water lily cover HALF the pond?",
 indice:"Reason backwards: the day before day 10, what surface did it cover?",
 etapes:["Each day, the surface doubles.","So the day before day 10, it covered half the pond: day 9!","The reflex « 10 ÷ 2 = 5 » is the trap: growth isn't steady, it doubles.","Answer: 9 days. One of the world's most famous riddles — well done!"]},
"m5e21":{titre:"The clearing mosaic",unit:"squares",histoire:"At the centre of the clearing, a mosaic: a big square split into 4 small tiles (2 rows of 2). The elf sniggers: « Everyone thinks they see 4 squares… but how many are there REALLY? »",
 q:"How many squares can you count in total in this mosaic?",
 indice:"There are the 4 small tiles… but don't forget the BIG square that contains them all!",
 etapes:["The 4 small tiles: 4 squares.","But the whole outline is ALSO a square: the big one, made up of the 4 small ones.","4 + 1 = 5 squares in total.","Shapes hidden inside shapes: keep your eyes open, geometry loves this game!"]},
"m5e22":{titre:"The book of numbers",histoire:"The Forest's grimoire states, on page 124: « Add any even number to any odd number: the result will ALWAYS be odd. »",
 q:"Is the grimoire telling the truth?",

"m5e23":{titre:"Plume's cats",histoire:"Plume the owl has several cats, and she's adamant: « ALL my cats are black. » Along a path, you cross paths with a snow-white animal.",

"m5e24":{titre:"The sphinx's three pencils",unit:"£",histoire:"The Forest sphinx guards the last door: « Three pencils cost £7 in total. The red one costs £1 MORE than the blue one. The green one costs EXACTLY the same as the blue one. Give me the price of the blue one, and pass. »",

"m6e1":{titre:"The great climbers' tea party",unit:"£",histoire:"Before the climb, you organise a tea party for the 15 climbers at the hut. You buy: a big cake for £18, a cup at £0.40 for each of the 15 climbers, and 3 bottles of juice at £1.80 each.",

"m6e2":{titre:"The glacier train",histoire:"The glacier's little red train leaves the hut's station at 14:37. The journey to the foot of the Peak takes exactly 1 h 45.",

"m6e3":{titre:"The cartographer's notebook",unit:"digits",histoire:"The Peak's cartographer hand-numbers the 99 pages of his new exploration notebook: 1, 2, 3, … up to 99. He sighs: « How many digits will I have to write in total? »",

"m6e4":{titre:"Saving up at altitude",unit:"weeks",histoire:"At base camp, the shop sells a pair of exploration binoculars for £50. You already have £18 in your piggy bank, and you get £4 pocket money each week, all of which you save.",

"m6e5":{titre:"The snow class",unit:"pupils",histoire:"At the hut, the teacher tells you: « In my class, half the pupils go sledging, a quarter go skiing, and the remaining 6 build a snowman. » He smiles: « Can you work out how many pupils are in my class? »",

"m6e6":{titre:"The windy pass stage",unit:"km",histoire:"The Peak's cyclist tackles the windy pass. She climbs at a steady speed of 15 km/h and pedals for 2 h 30 without stopping.",

"m6e7":{titre:"The back-to-school calendar",histoire:"At the Peak, preparations for the great back-to-school party are already underway. This year, 2 September — the first day of term — falls on a Wednesday. The party will be held on 23 September.",

"m6e8":{titre:"The duel of the pens",histoire:"Two Peak shepherds compare their pens. Both used exactly 12 m of fencing. The first claims: « Same length of fencing, so our sheep must have exactly the same amount of grass! »",

"m6e9":{titre:"The hut's cake sale",unit:"cakes",histoire:"Big sale at the hut: 120 cakes were prepared. In the morning, 3/4 of the cakes are sold. In the afternoon, the gourmands buy 2/3 of what was left.",

"m6e10":{titre:"The pool cover",unit:"£",histoire:"The hut has a rectangular pool 8 m by 4 m. Before winter, it must be covered with a custom-made cover, exactly to its size. The maker sells the cover at £12 per square metre.",

"m6e11":{titre:"The guide's gift",histoire:"Three friends want to give their mountain guide a compass costing £45. The seller grants them a 10% discount, and they split the cost equally. Put their reasoning back in order!",

"m6e12":{titre:"⭐ The ultimate challenge: the Peak fête",unit:"£",histoire:"Here you are at the summit! One last challenge, worthy of a maths rally: the great fête sold 250 tickets at £2 each. Running costs came to £175. Half the profit goes to the school-trip fund, and the rest is shared equally between the school's 5 classes.",

"m6e13":{titre:"The hut cinema evening",unit:"£",histoire:"The Peak hut is organising a cinema evening. Your group buys 2 adult tickets at £8 and 3 children's tickets at £5. The cashier waits for the exact total.",

"m6e16":{titre:"The duel of the pens, the return",histoire:"The two Peak shepherds have learnt their lesson… The first builds a square pen 4 m on a side. The second, a rectangular pen 6 m by 2 m. The first declares: « This time, our two pens have the SAME perimeter! »",

"m6e20":{titre:"The Peak fête budget",unit:"£",histoire:"For the Peak fête, you have a budget of £60. You first spend 1/3 of the budget on the giant cake. Then you spend 25% of what's LEFT on balloons.",
