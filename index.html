/* ----- type ordre : construction + glisser-déposer ----- */
let ordreItems=[];
function initOrdre(){
  const ordre=tex(EX,"ordre")||EX.ordre;
  ordreItems=melange(ordre.map((t,i)=>({t,i})));
  if(ordreItems.every((o,k)=>o.i===k))ordreItems.reverse();
  ordreRep=[];rendOrdre();
}
function rendOrdre(){
  const zr=document.getElementById("zoneRep"),zs=document.getElementById("zoneSrc");
  if(!zr||!zs)return;
  zr.innerHTML=ordreRep.length?ordreRep.map((o,k)=>
    '<div class="chip dans-reponse" data-k="'+k+'"><span class="poignee">⠿</span><span>'+o.t+'</span></div>').join("")
   :'<div style="color:var(--gris);font-size:14px;text-align:center;padding:8px">'+t("place_premiere_etape")+'</div>';
  zs.innerHTML=ordreItems.map((o,k)=>
    '<div class="chip" data-s="'+k+'"><span class="poignee">＋</span><span>'+o.t+'</span></div>').join("");
  zs.querySelectorAll("[data-s]").forEach(el=>el.addEventListener("click",()=>{
    const k=+el.dataset.s;ordreRep.push(ordreItems[k]);ordreItems.splice(k,1);son("pose");rendOrdre();
  }));
  zr.querySelectorAll("[data-k]").forEach(el=>{
    el.addEventListener("pointerdown",ev=>debutGlisse(ev,el));
  });
}
let glisse=null;
function debutGlisse(ev,el){
  const k=+el.dataset.k;
  glisse={k,el,x0:ev.clientX,y0:ev.clientY,bouge:false,clone:null};
  el.setPointerCapture(ev.pointerId);
  el.addEventListener("pointermove",mvGlisse);
  el.addEventListener("pointerup",finGlisse);
  el.addEventListener("pointercancel",finGlisse);
}
function mvGlisse(ev){
  if(!glisse)return;
  if(!glisse.bouge&&Math.abs(ev.clientY-glisse.y0)<8&&Math.abs(ev.clientX-glisse.x0)<8)return;
  if(!glisse.bouge){
    glisse.bouge=true;
    const r=glisse.el.getBoundingClientRect();
    glisse.clone=glisse.el.cloneNode(true);glisse.clone.classList.add("drag");
    glisse.clone.style.setProperty("--wchip",r.width+"px");
    glisse.clone.style.left=r.left+"px";glisse.clone.style.top=r.top+"px";
    document.body.appendChild(glisse.clone);glisse.el.classList.add("fantome");
  }
  glisse.clone.style.transform="translate("+(ev.clientX-glisse.x0)+"px,"+(ev.clientY-glisse.y0)+"px) rotate(2deg)";
  const zr=document.getElementById("zoneRep");
  const chips=[...zr.querySelectorAll("[data-k]")].filter(c=>c!==glisse.el);
  let cible=ordreRep.length-1;
  for(let i=0;i<chips.length;i++){
    const r=chips[i].getBoundingClientRect();
    if(ev.clientY<r.top+r.height/2){cible=+chips[i].dataset.k;if(cible>glisse.k)cible--;break;}
    if(i===chips.length-1)cible=ordreRep.length-1;
  }
  glisse.cible=cible;
}
function finGlisse(ev){
  if(!glisse)return;
  const g2=glisse;glisse=null;
  g2.el.removeEventListener("pointermove",mvGlisse);
  g2.el.removeEventListener("pointerup",finGlisse);
  g2.el.removeEventListener("pointercancel",finGlisse);
  if(g2.clone)g2.clone.remove();
  if(g2.bouge){
    if(g2.cible!==undefined&&g2.cible!==g2.k){
      const it=ordreRep.splice(g2.k,1)[0];ordreRep.splice(g2.cible,0,it);son("pose");
    }
    rendOrdre();
  }else{
    const it=ordreRep.splice(g2.k,1)[0];ordreItems.push(it);son("clic");rendOrdre();
  }
}

  if(defi&&defi.id===EX.id&&p.defiFait!==dateJour()){
    p.defiFait=dateJour();p.defisReussis=(p.defisReussis||0)+1;xp*=2;bonusDefi=true;

   +(et<3&&deja<3?'<p class="msg">'+(indiceUtilise?(EN?"The hint cost you one star — next time, try on your own first!":"L'indice t'a coûté une étoile — la prochaine fois, tente d'abord tout seul"+g("e","")+" !"):(EN?"Replay this exercise another day to aim for 3 stars!":"Rejoue cet exercice un autre jour pour viser les 3 étoiles !"))+'</p>':"")

  if(el.dataset.choisir){S.actif=el.dataset.choisir;sauve();son("ok");rCarte();return;}
  if(el.dataset.choix!==undefined)return clicQCM(el);
  if(el.dataset.vf!==undefined)return clicVF(el);
  if(el.dataset.justif!==undefined)return clicJustif(el);
  const act=el.dataset.act;
  if(act==="muet"){S.muet=!S.muet;sauve();el.textContent=S.muet?"🔇":"🔊";if(S.muet)arreteParole();return;}
  if(act==="toggle-lang"){S.lang=estEN()?"fr":"en";sauve();arreteParole();
    document.documentElement.lang=S.lang;son("clic");vueActuelle();return;}
  son("clic");
  if(act==="retour"){arreteParole();if(el.dataset.vers==="monde"&&EX)rMonde(EX.w);else rCarte();}
  else if(act==="profil"){arreteParole();rProfil();}
  else if(act==="renommer")rProfil(true);
  else if(act==="valider-nom")validerRenommage();
  else if(act==="vers-profils"||act==="retour-profils"){arreteParole();rProfils();}
  else if(act==="defi-fratrie"){arreteParole();rDefiFratrie(el.dataset.de==="carte");}
  else if(act==="retour-fratrie"){if(venuDeCarteFratrie&&S.actif)rCarte();else rProfils();}
  else if(act==="nouveau-profil"){arreteParole();rNouveauProfil();}
  else if(act==="monde"){const w=+el.dataset.w;if(mondeOuvert(w)){arreteParole();rMonde(w);}else son("ko");}
  else if(act==="exo")rExo(el.dataset.id);
  else if(act==="defi")rExo(el.dataset.id,true);
  else if(act==="indice")montreIndice();
  else if(act==="parler")parle(tex(EX,"histoire")+". "+tex(EX,"q"));
  else if(act==="valider")validerExo();
  else if(act==="solution")montreSolution(true);
  else if(act==="retour-apres-solution"){
    if(mondeNeufEnAttente){const w=mondeNeufEnAttente;mondeNeufEnAttente=0;rCarte(w);}
    else rMonde(EX.w);
  }
  else if(act==="revoir"){
    voile.classList.remove("actif");
    const barre=document.querySelector(".barre-exo");
    if(barre)barre.innerHTML='<button class="btn vert large" data-act="suivant">'+t("continuer")+'</button>';
    document.getElementById("zoneSolution").scrollIntoView({behavior:"smooth",block:"nearest"});
  }
  else if(act==="suivant")exoSuivant();
  else if(act==="reset"){
    if(el.dataset.confirme){
      const id=S.actif,ancien=S.profils[id];
      const neuf=PROFIL_DEFAUT();
      neuf.id=id;neuf.nom=ancien.nom;neuf.genre=ancien.genre;
      neuf.cheveux=ancien.cheveux;neuf.peau=ancien.peau;neuf.coiffure=ancien.coiffure;
      neuf.parcours=ancien.parcours;
      S.profils[id]=neuf;sauve();rCarte();
    }
    else{el.dataset.confirme="1";el.textContent=t("sur_q")+g("e","")+t("sur_confirme");}
  }
});

 etapes:["9 = 10 − 1, so taking away 9 is the same as taking away 10 then giving back 1.","47 − 10 = 37, then 37 + 1 = 38.","This trick works for every subtraction of 9, 19, 29…"]},
"c1e25":{titre:"The boxes of pencils",unit:"pencils",histoire:"The teacher hands out the new school supplies: 3 boxes of 8 colouring pencils each.",
 q:"How many colouring pencils altogether?",
 indice:"3 boxes of 8: that's 8 + 8 + 8, or 3 × 8.",
 etapes:["8 + 8 = 16, then 16 + 8 = 24.","3 × 8 = 24 colouring pencils."]},
"c1e26":{titre:"Adding at a glance",histoire:"Two neighbouring villages count their people to merge them: 217 in the first, 198 in the second. The mayor wants a quick estimate, without working it all out.",

 indice:"217 is close to 220, and 198 is nearly 200. Add these round numbers.",
 etapes:["217 ≈ 220 and 198 ≈ 200.","220 + 200 = 420.","The exact result is 415: our estimate of 420 is excellent!"]},
"c1e27":{titre:"The sticker album",unit:"stickers",histoire:"Nina proudly sticks her stickers into her album: she already had 34, and her friend gives her 28 more.",

 indice:"First add the tens (30 + 20), then the units (4 + 8).",

"c1e28":{titre:"The double trap",type:"vf",histoire:"On the board, a pupil writes: « Double 23 is 45. »",

"c1e29":{titre:"Leo's treasure box",unit:"marbles",histoire:"Leo sorts his collection: 15 red marbles, 12 blue marbles and 9 green marbles, all in the same box.",
 q:"How many marbles does Leo have altogether?",
 indice:"Add two colours first, then add the third. Try 15 + 9 first!",
 etapes:["15 + 9 = 24 (trick: 15 + 5 = 20, then + 4 = 24).","24 + 12 = 36.","Leo has 36 marbles altogether. Choosing the order of additions can make the calculation easier!"]},
"c1e30":{titre:"Building the 6 times table",type:"ordre",histoire:"Priam has forgotten what 8 × 6 makes. His big brother shows him a trick to work it out without knowing the table by heart. Put his reasoning back in order!",
 q:"Put the steps of working out 8 × 6 in the right order:",

 indice:"Start from a multiplication you already know (8 × 5), then add one more packet of 8.",

"c2e5":{titre:"The sailors' parade",type:"vf",histoire:"37 sailors must parade on the quay. The captain orders: « Get into pairs, and nobody left alone! »",

"c2e6":{titre:"The counting lighthouse",histoire:"The Harbour's lighthouse has already shone for 495 nights. The keeper thinks: « In 10 nights, I'll celebrate a nice round number… »",

"c2e7":{titre:"The fishing contest",histoire:"Four fishermen compare their yearly scores: 909 fish, 990, 899 and 908. The SMALLEST score has to buy everyone hot chocolate!",

"c2e8":{titre:"The ship's chest code",histoire:"The ship's chest opens with a single secret digit: « the tens digit of the number 274 », says the scroll.",

"c2e9":{titre:"The harbour grocer's crates",histoire:"The Harbour grocer receives a big crate marked « 100 biscuits ». He wants to arrange it into small boxes of 10 biscuits, without leaving a single one out.",

"c2e10":{titre:"The mermaid's mystery number",histoire:"A mermaid guards the entrance to the Harbour and gives you her riddle: « My number is between 60 and 70, and its units digit is 4. Find it, and I'll let you through! »",

"c2e11":{titre:"The mystery parcel",histoire:"A parcel arrives at the Harbour with a coded label: « 400 + 20 + 6 ». The postman must find the matching berth number.",

"c2e12":{titre:"The hundredth voyage",histoire:"The Harbour's old tugboat has already made 358 voyages. Its captain dreams of the moment the counter shows 100 voyages more.",

"c2e13":{titre:"The hundreds lock",histoire:"Ship number 672 must pass through the lock. The keeper sorts ships into hundreds: « You're between… let's see… »",

"c2e14":{titre:"The lobster pots",histoire:"The Harbour's lobster pots are numbered in 5s along the quay: 85, 90, 95… The next number has been washed away by the sea salt.",

 etapes:["The sequence goes up in 5s.","95 + 5 = 100.","The next pot is number 100 — a lovely round hundred!"]},
"c2e15":{titre:"The cabin boys' bet",type:"vf",histoire:"Two cabin boys compare their cabin numbers. The first claims: « My cabin 409 has a bigger number than your cabin 490, since 9 is bigger than 0! »",

"c2e16":{titre:"The quay 831 treasure",histoire:"The Harbour's treasure map says: « The treasure is buried at the foot of the post bearing the HUNDREDS digit of the number 831. »",

 indice:"831 = 800 + 30 + 1. The hundreds digit is the one for the « hundreds ».",

"c2e17":{titre:"Boarding in pairs",histoire:"Four ships are waiting at the Harbour: 341, 523, 608 and 195. Only the ship with an EVEN number can dock at the goods jetty.",

 indice:"A number is even if its LAST digit is 0, 2, 4, 6 or 8.",

"c2e18":{titre:"The big warehouse",histoire:"The Harbour's big warehouse must store 1,000 crates of spices. The storekeeper stacks them in piles of 10 crates, neatly lined up.",

"c2e19":{titre:"The harbour target",histoire:"At the Harbour's darts stall, you must hit the number CLOSEST to 300. Four darts are stuck in: 289, 350, 210 and 399.",

"c2e20":{titre:"The lookout's riddle",histoire:"From the top of the mast, the lookout shouts her riddle: « My number has 3 digits! Its hundreds digit is 5. Its tens digit is DOUBLE 2. Its units digit is 0. »",
 q:"What is the lookout's number?",
 indice:"Hundreds: 5. Tens: double 2, which is… Units: 0.",

"c2e21":{titre:"The captain's number in words",histoire:"The Harbour captain dictates a number to his first mate, who must write it in digits: « seven hundred and eighty-three ».",

"c2e22":{titre:"The four almost-identical sailing boats",histoire:"Four sailing boats carry very close numbers: 452, 458, 451 and 459. The captain wants to congratulate the one with the biggest number.",

"c2e23":{titre:"Ranking the distances",type:"ordre",histoire:"Three boats have sailed different distances: 245 km, 198 km and 250 km. The captain wants to rank them from shortest to longest.",

"c2e25":{titre:"The round-number debate",type:"vf",histoire:"Two cabin boys argue: one claims that « 500 is an even number », the other isn't so sure.",

"c2e26":{titre:"The number written in words",histoire:"On the Harbour's old map, a number is written entirely in words, half worn away by sea water: « Three hundred and sixteen ».",

"c3e4":{titre:"Choosing the right tool",histoire:"The Village teacher wants to measure the length of the classroom to fit a bookcase. He's unsure which unit to use.",

"c3e5":{titre:"The haberdasher's ribbon",histoire:"The Village haberdasher has a golden ribbon exactly 1 metre long. She cuts off 40 centimetres to decorate a hat.",

"c3e7":{titre:"The Village festival",histoire:"It's 28 June in the Village. The big summer festival will take place in exactly 3 days, says the town hall poster. But careful: June only has 30 days!",

"c3e8":{titre:"The giant pancake batter",histoire:"For the festival, the Village baker pours 250 g of wheat flour into his bowl, then 250 g of chestnut flour. His scales show the total.",

 indice:"250 + 250… That's a double you might already know!",

"c3e9":{titre:"The walker's signpost",type:"vf",histoire:"At the edge of the Village, a signpost reads: « Waterfall: 1 km » and « Mill: 500 m ». Your friend claims: « The waterfall is further than the mill. »",

"c3e10":{titre:"The little hill train",histoire:"The little tourist train leaves the Village at 9:20 am. The journey to the hills takes 20 minutes, through lavender fields.",

 indice:"First the notes (5 + 5), then the coin.",
 etapes:["The notes: 5 + 5 = £10.","With the coin: 10 + 2 = £12.","You set off to market with £12. Counting by note type is simpler!"]},
"c3e12":{titre:"The clockmaker's lesson",histoire:"The Village clockmaker teaches you his trade: « When the big hand does a HALF turn of the face, that means… »",

"c3e13":{titre:"The baker's flour bag",histoire:"The Village baker opens a brand-new 1 kg bag of flour. He pours out 250 g for his first batch of croissants.",

"c3e14":{titre:"The walker's water bottle",histoire:"At the Village fountain, a walker fills his big water bottle. He wonders which unit to use to describe the amount of water.",

"c3e15":{titre:"The festival ribbons",histoire:"To decorate the Village's tall maypole, the seamstress sews together 3 ribbons of 20 cm each: one red, one yellow and one blue.",
 q:"What is the total length of the decoration, in cm?",

"c3e16":{titre:"The afternoon hour",type:"vf",histoire:"The town hall clock shows 15:00. A tourist exclaims: « 15:00? Back home we also say 3 o'clock in the afternoon — it's the same! »",

 etapes:["The afternoon starts at 12:00 (noon).","15 − 12 = 3: 15:00 = 3 pm.","To convert an afternoon hour, take away 12. (And 20:00 = 8 pm!)"]},
"c3e17":{titre:"The weekly piggy bank",unit:"£",histoire:"Every Sunday, you slip your £2 pocket money coin into your Village piggy bank. You've now been saving for 4 weeks without giving in!",

"c3e18":{titre:"The scales challenge",histoire:"On the Village square, the fairground stallholder throws down his challenge: « Which is heavier: 1 kilo of feathers… or 1 kilo of stones? » The crowd laughs, but you think it through.",

"c3e19":{titre:"The Village thermometer",unit:"degrees",histoire:"This morning, the Village thermometer showed 8 degrees. With the lovely sunshine, the temperature climbed by 9 degrees in the afternoon.",
 q:"What is the temperature now?",
 indice:"8 + 9: go via 10 (8 + 2, then + 7).",

"c3e20":{titre:"The 11 o'clock carriage",histoire:"The Village carriage leaves the square at 10:50 am for its tour of the farms, which lasts exactly 20 minutes.",

"c4e8":{titre:"The trickster staircase",unit:"steps",histoire:"The Labyrinth's staircase loves to play tricks! You climb 5 steps, it slides you back down 2, then you climb 4 steps in one go.",

"c4e9":{titre:"The school-trip buses",type:"ordre",histoire:"The Labyrinth's school is off on a trip: 23 children, and only 2 small buses with 10 seats each. The teacher works it out aloud, but her sentences got jumbled!",

"c4e20":{titre:"The great sorcerer's reversed machine",histoire:"Final room! The Labyrinth's great sorcerer challenges you: « My machine took a number, ADDED 5 to it, then DOUBLED the whole thing. It shows 20. What number did I feed in? »",

"c5e14":{titre:"Half a bottle of maple syrup",acc:["0.5","1/2"],histoire:"A Forest bottle holds 1 litre of maple syrup. Half of it is poured into a small glass.",

"c6e3":{titre:"The drawbridge angle",svg:'<svg viewBox="0 0 140 140" width="130"><path d="M20 120 L20 20 M20 120 L120 120" stroke="#2d3436" stroke-width="6" fill="none" stroke-linecap="round"/><rect x="20" y="102" width="18" height="18" fill="none" stroke="#2d3436" stroke-width="3"/></svg>',

"c6e6":{titre:"The perpendicular corridors",type:"vf",svg:'<svg viewBox="0 0 140 140" width="130"><path d="M20 120 L20 20 M20 120 L120 120" stroke="#2d3436" stroke-width="6" fill="none" stroke-linecap="round"/><rect x="20" y="102" width="18" height="18" fill="none" stroke="#2d3436" stroke-width="3"/></svg>',

"c6e7":{titre:"The rails that never touch",histoire:"On the Castle's plans, some lines NEVER cross, even extended forever in both directions: they're called parallel lines.",

"c6e8":{titre:"The throne room carpet",unit:"m²",svg:'<svg viewBox="0 0 200 130" width="190"><rect x="10" y="10" width="180" height="108" fill="#E7FBF4" stroke="#00b894" stroke-width="3"/><g stroke="#00b894" stroke-width="1.5" opacity="0.6"><line x1="46" y1="10" x2="46" y2="118"/><line x1="82" y1="10" x2="82" y2="118"/><line x1="118" y1="10" x2="118" y2="118"/><line x1="154" y1="10" x2="154" y2="118"/><line x1="10" y1="46" x2="190" y2="46"/><line x1="10" y1="82" x2="190" y2="82"/></g></svg>',

"c6e9":{titre:"The symmetrical coat of arms",histoire:"The Castle's coat of arms has a vertical line of symmetry: folded in half vertically, its two halves match exactly.",

"c6e11":{titre:"The shape with 4 equal sides",histoire:"The Castle architect describes a shape: « It has 4 perfectly equal sides AND 4 right angles. »",

"c6e12":{titre:"Does a rectangle always have right angles?",type:"vf",histoire:"A young Castle apprentice wonders: « Does a rectangle always have 4 right angles, even if it's not a square? »",

"c6e15":{titre:"The mirror stained-glass window",histoire:"On the Castle's stained-glass window, only the left half is drawn. The master glazier must draw the right half EXACTLY the same, like in a mirror.",

"c6e16":{titre:"⭐ The royal architect's great challenge",unit:"£",histoire:"The Castle's final challenge! The king commissions a new rectangular hall 10 m long and 6 m wide. A golden border must be fitted all around, costing £5 per metre.",

Object.assign(TRAD_EN,{
"m1e1":{titre:"The open-air cinema",histoire:"On the Archipelago beach, there's a film showing tonight. Nora wants to invite her whole gang: she needs 7 tickets at £8.90 each. She has no calculator, just her head!",
 q:"Without doing the sum, what's the rough size of the total price?",choices:["About £45","About £63","About £90","About £120"],
 indice:"£8.90 is almost £9. What do 7 tickets at £9 make?",
 etapes:["£8.90 is very close to £9.","7 × 9 = 63, so the total price is close to £63.","The exact price is 7 × 8.90 = £62.30: our estimate of £63 was excellent!"]},
"m1e2":{titre:"The bead necklace",unit:"beads",histoire:"The island's craftswoman makes necklaces of 19 beads. A shop orders 25 of them! She wants to know how many beads are needed… without doing the multiplication on paper.",
 q:"Work it out cleverly: 25 × 19 = ?",
 indice:"19 is 20 − 1. Work out 25 × 20, then take away the extra.",
 etapes:["19 = 20 − 1, so 25 × 19 = 25 × 20 − 25 × 1.","25 × 20 = 500.","500 − 25 = 475. She needs 475 beads.","The trick: replace an « awkward » number with a nearby round one."]},
"m1e3":{titre:"The jumping contest",histoire:"Three frogs from the Archipelago hold a long-jump contest. Zip jumped 3.45 m, Zap jumped 3.5 m and Zoup jumped 3.405 m.",
 q:"Who made the biggest jump?",choices:["Zip (3.45 m)","Zap (3.5 m)","Zoup (3.405 m)","They're tied"],
 indice:"Write all three numbers with the same number of digits after the decimal point: 3.450 · 3.500 · 3.405.",
 etapes:["To compare decimals, we can give them the same number of digits after the decimal point.","3.45 = 3.450; 3.5 = 3.500; 3.405 stays 3.405.","3.500 > 3.450 > 3.405: Zap wins.","Trap dodged: 3.5 isn't « smaller because it's shorter to write »!"]},
"m1e4":{titre:"The ice-cream seller's change",unit:"£",histoire:"At the ice-cream stand, your « Blue Lagoon » scoop costs £4.37. You hand the seller a £10 note, and he looks at you mischievously: « How about YOU work out the change? »",
 q:"How much change should the ice-cream seller give you, in pounds?",
 indice:"Go step by step: from 4.37 to 5, then from 5 to 10.",
 etapes:["From £4.37 to £5, that's £0.63.","From £5 to £10, that's £5.","0.63 + 5 = £5.63. That's the « complement » technique, used by real shopkeepers!"]},
"m1e5":{titre:"The captain's recipe",histoire:"The harbour captain must work out 18 × 5 in his head to pay his sailors. He explains his favourite method… but his notes fell and got mixed up!",
 q:"Put the steps of his clever calculation in the right order:",
 ordre:["I notice that 5 is half of 10.","I first calculate 18 × 10 = 180.","I take half: 180 ÷ 2 = 90.","Conclusion: 18 × 5 = 90."],
 indice:"Start from a remark about the number 5, then calculate with 10, which is much simpler.",
 etapes:["Multiplying by 5 is multiplying by 10 then dividing by 2.","18 × 10 = 180, then 180 ÷ 2 = 90.","This trick works for every × 5: try it with 24 × 5!"]},
"m1e6":{titre:"The mermaids' argument",histoire:"Two mermaids are arguing. Marina claims: « 0.7 is smaller than 0.12, it's obvious, since 7 is smaller than 12! »",
 q:"Is Marina right?",
 justif:["She's right: 7 < 12, so 0.7 < 0.12.","She's wrong: 0.7 = 0.70, and 70 hundredths is more than 12 hundredths."],
 indice:"Write both numbers in hundredths: 0.7 = 0.70. Compare 70 hundredths and 12 hundredths.",
 etapes:["0.7 is 7 tenths, that is 70 hundredths (0.70).","0.12 is 12 hundredths.","70 hundredths > 12 hundredths, so 0.7 > 0.12: Marina is wrong.","With decimals, we compare digit by digit starting from the left, not the « length » of the number."]},
"m1e7":{titre:"The floating market basket",unit:"£",histoire:"At the floating market, you buy a pineapple for £2.95, a coconut bread for £4.05 and a mango juice for £3.50. The seller challenges you to find the total in your head before he does.",
 q:"What is the total price of the basket, in pounds?",
 indice:"Look closely at 2.95 and 4.05… those two add up very easily!",
 etapes:["Trick: 2.95 + 4.05 = £7 exactly (95p + 5p = £1).","7 + 3.50 = £10.50.","Looking for pairs that « make a round number » makes mental maths much faster."]},
"m1e8":{titre:"The lighthouse treasure",histoire:"The code for the lighthouse chest is hidden in the number 3.07. The keeper asks you: « To open the chest, tell me what the digit 7 is worth in this number. »",
 q:"In 3.07, what does the digit 7 represent?",choices:["7 units","7 tenths","7 hundredths","7 tens"],
 indice:"After the decimal point, the first place is tenths, the second is hundredths.",
 etapes:["In 3.07: 3 is the units digit.","The 0 right after the decimal point is the tenths digit.","The 7 is in the second place after the decimal point: that's hundredths.","3.07 = 3 + 7/100. The chest opens!"]},
"m1e9":{titre:"The harbour aquariums",unit:"fish",histoire:"The Archipelago harbour has 4 large aquariums, each containing 26 multicoloured fish. The sea vet must vaccinate them all and wants the total in her head.",
 q:"How many fish altogether? (Work it out cleverly!)",
 indice:"26 = 25 + 1, and 4 × 25 works itself out (think of 25p coins… or quarter hours!).",
 etapes:["26 = 25 + 1, so 4 × 26 = 4 × 25 + 4 × 1.","4 × 25 = 100 (like 4 quarter hours = 1 hour).","100 + 4 = 104 fish.","Breaking a number apart makes mental maths crystal clear."]},
"m1e10":{titre:"The island library",unit:"books",histoire:"The island's little library has just been reorganised: 3 shelves each hold 24 books, and 17 new books are still waiting in a box.",
 q:"How many books does the library have altogether?",
 indice:"This problem has two steps: first the books on the shelves, then the ones in the box.",
 etapes:["Step 1: books on the shelves → 3 × 24 = 72.","Step 2: add the box → 72 + 17 = 89.","The library has 89 books. Always spot the steps before calculating!"]},
"m1e11":{titre:"The boat trip",histoire:"The 43 pupils of the Archipelago school are off to visit Turtle Island. Each boat can carry a maximum of 30 passengers. The head teacher thinks about how many boats to book…",
 q:"How many boats need to be booked?",choices:["1 boat","2 boats","1.43 boats","43 boats"],
 indice:"43 ÷ 30 doesn't come out even… What happens to the pupils who don't fit in the first boat?",
 etapes:["One boat isn't enough: 30 seats for 43 pupils.","First boat: 30 pupils. That leaves 43 − 30 = 13.","These 13 pupils need a second boat, even if it isn't full.","In real life, we round up: 2 boats are needed. (There's no such thing as « 1.43 » of a boat!)"]},
"m1e12":{titre:"The volcano's mystery number",histoire:"At the summit of the sleeping volcano, a voice rumbles: « I'm thinking of a number. I double it, add 8, and get 30. Find my number, and the Archipelago will open the road to the Valley for you! »",
 q:"What is the mystery number?",
 indice:"Start from the result and work backwards: before adding 8, what did we have? And before doubling?",
 etapes:["We work the programme backwards, step by step.","Before adding 8, there was 30 − 8 = 22.","Before doubling, there was 22 ÷ 2 = 11.","Check: 11 × 2 = 22, then 22 + 8 = 30. ✓ The mystery number is 11!"]},
"m1e13":{titre:"The great sailing ship's cargo",histoire:"The Archipelago's great sailing ship carries 302 crates, each holding 9 coconuts. The captain wants a quick estimate before checking his logbooks.",
 q:"What's the rough size of the number of coconuts?",choices:["About 270","About 2,700","About 27,000","About 320"],
 indice:"302 is almost 300. And 300 × 9?",
 etapes:["302 is close to 300.","300 × 9 = 2,700.","The exact result is 2,718: our estimate was excellent!","A rough estimate helps check we haven't got the « size » of the result wrong."]},
"m1e14":{titre:"The fish market",unit:"sardines",histoire:"At the fish market, 45 crates of 11 sardines each have just arrived. The fishmonger works out the total in her head, smiling: « ×11, that's my favourite trick! »",
 q:"Work it out cleverly: 45 × 11 = ?",
 indice:"11 = 10 + 1, so 45 × 11 = 45 × 10 + 45.",
 etapes:["45 × 11 = 45 × 10 + 45 × 1.","45 × 10 = 450.","450 + 45 = 495 sardines.","Multiplying by 11: multiply by 10 and add the number once more."]},
"m1e15":{titre:"The two fresh-water drums",unit:"L",histoire:"For the crossing, the cabin boy loads two drums of fresh water: one holds 7.25 litres, the other 2.75 litres. The captain demands the total to the nearest litre… in his head!",
 q:"How many litres of water altogether?",
 indice:"Look at the decimal parts: 0.25 + 0.75 makes a round number!",
 etapes:["Decimal parts: 0.25 + 0.75 = 1.","Whole parts: 7 + 2 = 9, plus the 1 → 10.","7.25 + 2.75 = 10 litres exactly.","Spotting decimals that complete each other (0.25/0.75 · 0.4/0.6…) makes the calculation instant."]},
"m1e16":{titre:"The reef twins",histoire:"Three reef fish carry numbers on their scales: 5.08 — 5.8 — 5.080. Two of them are actually real twins: they carry exactly the same number!",
 q:"Which two numbers are equal?",choices:["5.08 and 5.8","5.8 and 5.080","5.08 and 5.080","They're all different"],
 indice:"Adding a zero right at the end AFTER the decimal point doesn't change a number: 5.08 = 5.080?",
 etapes:["5.080 is 5.08 with an unnecessary zero at the end: same number!","5.8 = 5.80, that's 80 hundredths — far more than the 8 hundredths of 5.08.","The twins are 5.08 and 5.080.","A zero at the END of the decimal part changes nothing; in the MIDDLE, it changes everything!"]},
"m1e17":{titre:"Filling up the water-taxi",unit:"L",histoire:"The water-taxi's tank holds 100 litres at most. The gauge shows 63.5 litres left after the island tour.",
 q:"How many litres need adding to fill up completely?",
 indice:"Complete: from 63.5 to 64, then from 64 to 100.",
 etapes:["From 63.5 to 64: 0.5 litre.","From 64 to 100: 36 litres.","0.5 + 36 = 36.5 litres to add.","Check: 63.5 + 36.5 = 100 ✓"]},
"m1e18":{titre:"The sea witch's potion",histoire:"The sea witch sells an « enlarging » potion: « Multiply any quantity by 0.5 and it will become bigger, that's my magic! »",
 q:"Is she right: does multiplying by 0.5 make a number bigger?",
 justif:["Yes: multiplying always makes things bigger.","No: multiplying by 0.5 means taking half — the result is smaller!"],
 indice:"Test it with 10: what does 10 × 0.5 make?",
 etapes:["10 × 0.5 = 5: the result is SMALLER than 10.","Multiplying by 0.5 is multiplying by 1/2, so taking half.","Multiplying by a number smaller than 1 always shrinks the quantity.","The witch's « magic » is a mathematical con!"]},
"m1e19":{titre:"The collector's shells",unit:"shells",histoire:"The island collector arranges his shells in 12 boxes of 25 shells each. He loves working out his treasure in his head, with style.",
 q:"Work it out cleverly: 12 × 25 = ?",
 indice:"4 × 25 = 100… and 12 is 3 × 4!",
 etapes:["12 = 3 × 4, so 12 × 25 = 3 × (4 × 25).","4 × 25 = 100.","3 × 100 = 300 shells.","Looking for packets of 25 that make 100: a golden trick."]},
"m1e20":{titre:"The floating market's eggs",histoire:"The island farmer brings 72 eggs to the floating market. She sells them in boxes of 6 eggs, and wants to prepare just the right number of boxes.",
 q:"How many boxes should she prepare?",choices:["6 boxes","12 boxes","66 boxes","432 boxes"],
 indice:"We're looking for how many times 6 fits into 72: that's a division.",
 etapes:["We're looking for 72 ÷ 6.","72 = 60 + 12, so 72 ÷ 6 = 10 + 2 = 12.","She needs 12 boxes.","Check: 12 × 6 = 72 ✓ Division answers « how many packets? »"]},
"m1e21":{titre:"The island's record",histoire:"The festival game: make the BIGGEST possible number with three cards drawn at random. You draw the cards 4, 7 and 2!",
 q:"What is the biggest possible three-digit number with 4, 7 and 2?",
 indice:"Put the biggest digit in the place worth the most: the hundreds.",
 etapes:["The hundreds place « weighs » the most: put the 7 there.","Then the 4 in the tens, and the 2 in the units.","The record: 742!","In a number, a digit's value depends on its position — that's the whole magic of our number system."]},
"m1e22":{titre:"The old accountant's technique",histoire:"The harbour accountant must work out 99 × 6 to pay the dockers. He puts down his pen and smiles: « No need to write it out! » Put his method back in order.",
 q:"Put the steps of working out 99 × 6 in order:",
 ordre:["I notice that 99 = 100 − 1.","I calculate 100 × 6 = 600.","I take away the extra 6: 600 − 6 = 594.","So 99 × 6 = 594."],
 indice:"He replaces 99 with a nice round number, then corrects it.",
 etapes:["99 × 6 = (100 − 1) × 6 = 100 × 6 − 1 × 6.","600 − 6 = 594.","This trick turns an awkward calculation into an instant one."]},
"m1e23":{titre:"The sailing school's pencil cases",unit:"pencils",histoire:"The sailing school prepares 5 identical pencil cases for its new pupils. In each case: 3 blue pencils and 4 red pencils.",
 q:"How many pencils are needed altogether?",
 indice:"First count the pencils in ONE case, then multiply.",
 etapes:["One case: 3 + 4 = 7 pencils.","5 cases: 5 × 7 = 35 pencils.","You can also calculate 5 × 3 + 5 × 4 = 15 + 20 = 35: both routes lead to the same harbour!"]},
"m1e24":{titre:"The volcano's second mystery number",histoire:"The volcano's voice rumbles again: « You're back, clever one… This time: I'm thinking of a number, I TRIPLE it, take away 7, and get 20. »",
 q:"What is the mystery number?",
 indice:"Work backwards: before taking away 7, how much was there? And before tripling?",
 etapes:["Before taking away 7: 20 + 7 = 27.","Before tripling: 27 ÷ 3 = 9.","Check: 9 × 3 = 27, then 27 − 7 = 20 ✓","The mystery number is 9. Working a calculation programme backwards is already algebra!"]}
});
