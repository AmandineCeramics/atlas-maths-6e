 indice:"Combien de fois 10 dans 1 000 ? Pense : 10 dizaines = 100, alors 1 000 = ?",
 etapes:["10 piles de 10 = 100 caisses.","Pour 1 000 caisses, il faut 10 fois plus : 100 piles.","1 000 = 100 × 10 : mille, c'est cent paquets de dix !"]},

{id:"c2e19",w:2,titre:"La cible du port",type:"qcm",
 histoire:"Au stand de fléchettes du Port, il faut toucher le nombre le plus PROCHE de 300. Quatre fléchettes sont plantées : 289, 350, 210 et 399.",
 q:"Quel nombre est le plus proche de 300 ?",
 choices:["289","350","210","399"],a:0,
 indice:"Calcule l'écart de chaque nombre avec 300 : lequel est le plus petit ?",
 etapes:["Écarts avec 300 : 289 → 11 ; 350 → 50 ; 210 → 90 ; 399 → 99.","Le plus petit écart est 11.","289 est le plus proche de 300 — même s'il est en dessous ! La proximité se mesure par l'écart, pas par le sens."]},

{id:"c2e20",w:2,titre:"L'énigme de la vigie",type:"saisie",num:540,
 histoire:"Du haut de son mât, la vigie crie son énigme : « Mon nombre a 3 chiffres ! Son chiffre des centaines est 5. Son chiffre des dizaines est le DOUBLE de 2. Son chiffre des unités est 0. »",
 q:"Quel est le nombre de la vigie ?",
 indice:"Centaines : 5. Dizaines : le double de 2, c'est-à-dire… Unités : 0.",
 etapes:["Centaines : 5.","Dizaines : le double de 2 = 4.","Unités : 0.","Le nombre est 540 ! Assembler des indices chiffre par chiffre : un vrai travail de détective."]},

/* ---- CE2 M3 · Village des Mesures (suite) ---- */
{id:"c3e11",w:3,titre:"Le porte-monnaie du marché",type:"saisie",num:12,unit:"€",
 histoire:"Pour le marché du Village, ta maman te confie 2 billets de 5 € et 1 pièce de 2 €. Mission : les légumes de la semaine !",
 q:"Combien d'argent as-tu en tout ?",
 indice:"D'abord les billets (5 + 5), puis la pièce.",
 etapes:["Les billets : 5 + 5 = 10 €.","Avec la pièce : 10 + 2 = 12 €.","Tu pars au marché avec 12 €. Compter par type de billet, c'est plus simple !"]},

{id:"c3e12",w:3,titre:"La leçon de l'horloger",type:"qcm",
 histoire:"L'horloger du Village t'apprend son métier : « Quand la grande aiguille fait un DEMI-tour du cadran, il s'est passé… »",
 q:"Une demi-heure, c'est combien de minutes ?",
 choices:["15 minutes","30 minutes","45 minutes","50 minutes"],a:1,
 indice:"Une heure entière = 60 minutes. Et la moitié de 60 ?",
 etapes:["1 heure = 60 minutes.","La moitié de 60 = 30.","Une demi-heure = 30 minutes : la grande aiguille passe du 12 au 6."]},

{id:"c3e13",w:3,titre:"Le sac de farine du boulanger",type:"saisie",num:750,unit:"g",
 histoire:"Le boulanger du Village ouvre un sac de farine de 1 kg tout neuf. Il en verse 250 g pour sa première fournée de croissants.",
 q:"Quelle masse de farine reste-t-il dans le sac, en grammes ? (1 kg = 1 000 g.)",
 indice:"Transforme d'abord le kilo en grammes : 1 kg = 1 000 g.",
 etapes:["1 kg = 1 000 g.","1 000 − 250 = 750 g.","Il reste 750 g. On convertit d'abord, on calcule ensuite !"]},

{id:"c3e14",w:3,titre:"La gourde du randonneur",type:"qcm",
 histoire:"À la fontaine du Village, un randonneur remplit sa grande gourde. Il se demande quelle unité utiliser pour décrire la quantité d'eau.",
 q:"Quelle unité convient pour mesurer l'eau d'une gourde ?",
 choices:["Le litre (L)","Le mètre (m)","Le gramme (g)","Le kilomètre (km)"],a:0,
 indice:"Le mètre mesure les longueurs, le gramme pèse… et pour les liquides ?",
 etapes:["Les liquides se mesurent en litres (et centilitres).","Une gourde contient environ 1 litre.","Longueurs → m, masses → g/kg, liquides → L : à chaque grandeur son unité !"]},

{id:"c3e15",w:3,titre:"Les rubans de la fête",type:"saisie",num:60,unit:"cm",
 histoire:"Pour décorer le grand mât du Village, la couturière coud bout à bout 3 rubans de 20 cm chacun : un rouge, un jaune et un bleu.",
 q:"Quelle est la longueur totale de la décoration, en cm ?",
 indice:"3 rubans de 20 cm : 20 + 20 + 20, ou 3 × 20.",
 etapes:["3 × 20 = 60.","La décoration mesure 60 cm.","Astuce : 3 × 2 = 6, donc 3 × 20 = 60. Les zéros suivent !"]},

{id:"c3e16",w:3,titre:"L'heure de l'après-midi",type:"vf",vfA:true,
 histoire:"La pendule de la mairie affiche 15 h. Un touriste s'exclame : « 15 h ? Chez nous, on dit aussi 3 heures de l'après-midi — c'est pareil ! »",
 q:"Le touriste a-t-il raison ?",
 justif:["Oui : après midi, on peut continuer à compter — 15 h, c'est 12 h + 3 h, donc 3 h de l'après-midi.","Non : 15 h et 3 h n'ont rien à voir, ce sont des heures différentes."],justifA:0,
 indice:"Que vaut 15 − 12 ?",
 etapes:["L'après-midi commence à 12 h (midi).","15 − 12 = 3 : 15 h = 3 h de l'après-midi.","Pour convertir une heure de l'après-midi, on enlève 12. (Et 20 h = 8 h du soir !)"]},

{id:"c3e17",w:3,titre:"La tirelire hebdomadaire",type:"saisie",num:8,unit:"€",
 histoire:"Chaque dimanche, tu glisses ta pièce de 2 € d'argent de poche dans ta tirelire du Village. Cela fait maintenant 4 semaines que tu économises sans craquer !",
 q:"Combien as-tu économisé en 4 semaines ?",
 indice:"4 semaines à 2 € : compte de 2 en 2, ou calcule 4 × 2.",
 etapes:["4 × 2 = 8.","Tu as économisé 8 €.","Économiser un peu chaque semaine, ça finit par faire beaucoup — c'est la magie de la régularité !"]},

{id:"c3e18",w:3,titre:"Le défi de la balance",type:"qcm",
 histoire:"Sur la place du Village, le forain lance son défi : « Qu'est-ce qui est le plus lourd : 1 kilo de plumes… ou 1 kilo de pierres ? » La foule rigole, mais toi, tu réfléchis.",
 q:"Alors, lequel est le plus lourd ?",
 choices:["Le kilo de pierres","Le kilo de plumes","Ils pèsent exactement pareil","Impossible à savoir"],a:2,
 indice:"Relis bien : UN KILO de plumes, UN KILO de pierres… Que dit la balance ?",
 etapes:["1 kilo = 1 kilo, peu importe la matière !","Le tas de plumes sera énorme et le tas de pierres tout petit… mais la balance affichera pareil.","Il ne faut pas confondre le VOLUME (la place que ça prend) et la MASSE (ce que ça pèse).","Un des pièges les plus célèbres du monde — et tu ne t'es pas fait avoir !"]},

{id:"c3e19",w:3,titre:"Le thermomètre du Village",type:"saisie",num:17,unit:"degrés",
 histoire:"Ce matin, le thermomètre du Village affichait 8 degrés. Avec le beau soleil, la température a grimpé de 9 degrés dans l'après-midi.",
 q:"Quelle température fait-il maintenant ?",
 indice:"8 + 9 : passe par 10 (8 + 2, puis + 7).",
 etapes:["8 + 2 = 10, puis 10 + 7 = 17.","8 + 9 = 17 degrés.","Un bel après-midi pour jouer dehors — les maths aussi savent lire la météo !"]},

{id:"c3e20",w:3,titre:"La calèche de 11 heures",type:"saisie",acc:["11h10","11:10","11 h 10"],
 histoire:"La calèche du Village part de la place à 10 h 50 pour son tour des fermes, qui dure exactement 20 minutes.",
 q:"À quelle heure la calèche revient-elle ? (Écris par exemple 11h05.)",
 indice:"10 h 50 + 10 min = 11 h 00… et il reste encore 10 minutes.",
 etapes:["De 10 h 50, ajoute 10 min : 11 h 00 pile.","Il reste 10 min à ajouter : 11 h 10.","La calèche revient à 11 h 10. Passer l'heure pile en deux temps : zéro erreur !"]},

/* ---- CE2 M4 · Labyrinthe Logique (suite) ---- */
{id:"c4e11",w:4,titre:"Le compte à rebours des dalles",type:"saisie",num:12,
 histoire:"Nouvelle salle du Labyrinthe ! Cette fois, les dalles RECULENT : 20, 18, 16, 14… Il faut annoncer la dalle suivante pour qu'elle apparaisse sous tes pieds.",
 q:"Quel nombre porte la dalle suivante ?",
 indice:"Observe : de 20 à 18, de 18 à 16… La suite descend de combien à chaque pas ?",
 etapes:["La suite recule de 2 en 2.","14 − 2 = 12.","Les suites peuvent monter OU descendre : il faut d'abord trouver leur « pas »."]},

{id:"c4e12",w:4,titre:"La balance aux fruits géants",type:"qcm",
 histoire:"Dans la salle des balances, tu découvres deux équilibres parfaits : 1 pastèque pèse autant que 2 melons. Et 1 melon pèse autant que 2 pommes.",
 q:"Une pastèque pèse autant que combien de pommes ?",
 choices:["2 pommes","3 pommes","4 pommes","6 pommes"],a:2,
 indice:"Remplace chaque melon par 2 pommes…",
 etapes:["1 pastèque = 2 melons.","Chaque melon = 2 pommes, donc 2 melons = 4 pommes.","1 pastèque = 4 pommes !","Remplacer une chose par sa valeur : le raisonnement en chaîne des logiciens."]},

{id:"c4e13",w:4,titre:"Le sac de bonbons du gardien",type:"saisie",num:6,unit:"bonbons",
 histoire:"Le gardien du Labyrinthe a 15 bonbons à la myrtille. Il en mange 3 en cachette, puis partage équitablement le reste entre ses 2 dragons de garde.",
 q:"Combien de bonbons reçoit chaque dragon ?",
 indice:"Étape 1 : combien reste-t-il après les 3 mangés ? Étape 2 : partage en 2.",
 etapes:["Après gourmandise : 15 − 3 = 12 bonbons.","Partage : 12 ÷ 2 = 6.","Chaque dragon reçoit 6 bonbons. Deux étapes, dans le bon ordre !"]},

{id:"c4e14",w:4,titre:"Le calendrier menteur",type:"vf",vfA:false,
 histoire:"Un parchemin poussiéreux du Labyrinthe proclame : « Tous les mois de l'année ont exactement 30 jours. »",
 q:"Le parchemin dit-il vrai ?",
 justif:["Oui : tous les mois se valent, c'est plus simple.","Non : janvier en a 31, février 28 ou 29… Les mois sont différents !"],justifA:1,
 indice:"Pense à janvier (31 jours) et surtout à février…",
 etapes:["Janvier, mars, mai, juillet, août, octobre, décembre : 31 jours.","Avril, juin, septembre, novembre : 30 jours.","Février : 28 jours (29 les années bissextiles).","Le parchemin ment ! Le calendrier est plus malin qu'il n'en a l'air."]},

{id:"c4e15",w:4,titre:"La famille de Léa la louve",type:"saisie",num:4,unit:"enfants",
 histoire:"Léa la louve monte la garde et te lance : « Dans ma famille, j'ai 2 frères et 1 sœur. Combien y a-t-il d'enfants chez nous ? » Elle ajoute avec un clin d'œil : « Attention, ne m'oublie pas ! »",
 q:"Combien d'enfants compte la famille de Léa ?",
 indice:"Ses 2 frères + sa sœur… + Léa elle-même !",
 etapes:["Les frères : 2. La sœur : 1.","Et Léa elle-même, qu'il ne faut pas oublier : + 1.","2 + 1 + 1 = 4 enfants.","Le piège classique : celui qui parle se compte aussi !"]},

{id:"c4e16",w:4,titre:"Le collier du Minotaure",type:"qcm",
 histoire:"Le gentil Minotaure du Labyrinthe enfile des perles selon un motif rituel : 🔺 🔺 ⚪ 🔺 🔺 ⚪ 🔺 … Il te tend le fil pour continuer.",
 q:"Quelle perle vient juste après ?",
 choices:["🔺 un triangle","⚪ un rond","On ne peut pas savoir"],a:0,
 indice:"Le motif qui se répète est : triangle, triangle, rond. Où en est-on ?",
 etapes:["Le paquet répété : 🔺 🔺 ⚪ (deux triangles puis un rond).","Le fil se termine par UN seul triangle : le paquet vient de commencer.","Il manque le 2e triangle : la perle suivante est 🔺 !","Repérer le paquet ET savoir où on en est dedans : double vigilance."]},

{id:"c4e17",w:4,titre:"L'anniversaire de maman louve",type:"saisie",num:5,unit:"ans",
 histoire:"Dans la tanière, maman louve a 30 ans aujourd'hui. Son louveteau demande : « Maman, dans combien d'années auras-tu 35 ans ? On fera une fête GÉANTE ! »",
 q:"Dans combien d'années maman louve aura-t-elle 35 ans ?",
 indice:"De 30 pour aller à 35, il faut ajouter combien ?",
 etapes:["On cherche : 30 + ? = 35.","30 + 5 = 35.","Dans 5 ans, fête géante ! Chercher « combien il manque », c'est déjà résoudre une équation."]},

{id:"c4e18",w:4,titre:"Le salut des trois chevaliers",type:"saisie",num:3,unit:"poignées de main",
 histoire:"Trois chevaliers se retrouvent à l'entrée du Labyrinthe. Très polis, chacun serre UNE fois la main de chacun des deux autres.",
 q:"Combien de poignées de main sont échangées en tout ?",
 indice:"Nomme-les A, B et C, et liste les paires : A-B, A-C… laquelle manque ?",
 etapes:["Les paires possibles : A-B, A-C, B-C.","Cela fait 3 poignées de main.","Pas 6 ! La poignée de A avec B est la MÊME que celle de B avec A.","Faire la liste complète sans doublon : la méthode qui ne rate jamais."]},

{id:"c4e19",w:4,titre:"Les fraises du goûter",type:"ordre",
 histoire:"Au cœur du Labyrinthe, 4 enfants perdus (mais gourmands) trouvent un panier de 24 fraises. Ils décident de se les partager équitablement. Remets leur raisonnement dans l'ordre !",
 q:"Remets les étapes du partage dans l'ordre :",
 ordre:["Nous avons 24 fraises pour 4 enfants.","Je partage : 24 ÷ 4, c'est-à-dire je cherche 4 × ? = 24.","4 × 6 = 24 : chaque enfant reçoit 6 fraises.","Vérification : 6 + 6 + 6 + 6 = 24, tout est distribué !"],
 indice:"D'abord ce qu'on a, puis le partage, puis la vérification.",
 etapes:["Un partage équitable, c'est une division : 24 ÷ 4.","Diviser, c'est chercher la multiplication à trous : 4 × ? = 24.","6 fraises chacun, et zéro dispute : les maths, c'est aussi la paix des goûters !"]},

{id:"c4e20",w:4,titre:"La machine inversée du grand sorcier",type:"saisie",num:5,
 histoire:"Dernière salle ! Le grand sorcier du Labyrinthe te défie : « Ma machine a pris un nombre, lui a AJOUTÉ 5, puis a DOUBLÉ le tout. Elle affiche 20. Quel nombre y suis-je entré ? »",
 q:"Quel était le nombre de départ ?",
 indice:"Remonte à l'envers : avant de doubler, il y avait quoi ? Et avant d'ajouter 5 ?",
 etapes:["Avant le doublement : 20 ÷ 2 = 10.","Avant l'ajout de 5 : 10 − 5 = 5.","Le nombre de départ était 5 !","Vérification : 5 + 5 = 10, puis 10 × 2 = 20 ✓ Le Labyrinthe s'incline devant toi ! 🌀"]}
);

{id:"c1e30",w:1,titre:"Construire la table de 6",type:"ordre",

/* ================== HELPERS ================== */
function totalEtoiles(p){return Object.values(p.etoiles).reduce((a,b)=>a+b,0);}
function niveau(xp){return Math.floor(xp/100)+1;}
function exosDuMonde(w){return pc().exos.filter(e=>e.w===w);}
function faits(p,w){return pc().exos.filter(e=>e.w===w&&((p.etoiles[e.id]||0)>0||p.vus[e.id])).length;}
function mondeFini(p,w){return pc().exos.filter(e=>e.w===w).every(e=>(p.etoiles[e.id]||0)>0);}
function seuilMonde(w){return Math.min(8,Math.ceil(exosDuMonde(w).length*2/3));}
function mondeOuvert(w){return w===1||faits(P(),w-1)>=seuilMonde(w-1);}
function echap(t){return String(t).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function dateJour(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function hier(){const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function melange(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* normalisation des réponses saisies */
function norm(t){return String(t).toLowerCase().replace(/\s+/g,"").replace(/,/g,".");}
function extraitNombre(t){const m=norm(t).match(/-?\d+(?:\.\d+)?/);return m?parseFloat(m[0]):NaN;}
function bonneSaisie(ex,val){
  if(!val||!norm(val))return false;
  if(ex.num!==undefined){const n=extraitNombre(val);return !isNaN(n)&&Math.abs(n-ex.num)<0.001;}
  const v=norm(val);
  return ex.acc.some(a=>norm(a)===v);
}

let ctxAudio=null;
function initAudio(){if(!ctxAudio){try{ctxAudio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
document.addEventListener("pointerdown",initAudio,{once:true});
function note(freq,debut,duree,type,vol){
  if(!ctxAudio||S.muet)return;
  const o=ctxAudio.createOscillator(),g=ctxAudio.createGain();
  o.type=type||"sine";o.frequency.value=freq;
  const t=ctxAudio.currentTime+debut;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.12,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,t+duree);
  o.connect(g);g.connect(ctxAudio.destination);o.start(t);o.stop(t+duree+0.05);
}

}

  return String(t||"")
   .replace(/[\u{1F1E6}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}️‍]/gu,"")
   .replace(/\s+/g," ").trim();
}

}

/* ================== CONFETTIS ================== */
const canv=document.getElementById("confettis"),cctx=canv.getContext("2d");
let parts=[],animConf=null;
function redim(){canv.width=innerWidth;canv.height=innerHeight;}
addEventListener("resize",redim);redim();
function confettis(n){
  const couleurs=["#6C5CE7","#FD79A8","#55EFC4","#FDCB6E","#74B9FF","#FF7675","#A29BFE"];
  for(let i=0;i<(n||90);i++)parts.push({
    x:Math.random()*canv.width,y:-20-Math.random()*canv.height*0.3,
    vx:(Math.random()-0.5)*3,vy:2+Math.random()*3.5,r:4+Math.random()*6,
    c:couleurs[Math.floor(Math.random()*couleurs.length)],
    a:Math.random()*Math.PI,va:(Math.random()-0.5)*0.25});
  if(!animConf)boucleConf();
}
function boucleConf(){
  cctx.clearRect(0,0,canv.width,canv.height);
  parts=parts.filter(p=>p.y<canv.height+30);
  for(const p of parts){
    p.x+=p.vx;p.y+=p.vy;p.a+=p.va;p.vy+=0.04;
    cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.a);
    cctx.fillStyle=p.c;cctx.fillRect(-p.r/2,-p.r/3,p.r,p.r*0.66);cctx.restore();
  }
  animConf=parts.length?requestAnimationFrame(boucleConf):null;
}

function exosReussis(p){return Object.values(p.etoiles).filter(v=>v>0).length;}
function condOK(p,cond){
  if(!cond)return true;
  const pk=PARCOURS[p.parcours];
  switch(cond.t){
    case"niveau":return niveau(p.xp)>=cond.v;
    case"etoiles":return totalEtoiles(p)>=cond.v;
    case"serie":return p.serie.record>=cond.v;
    case"defis":return (p.defisReussis||0)>=cond.v;
    case"exos":return exosReussis(p)>=cond.v;
    case"mondes":return pk.mondes.filter(m=>pk.exos.filter(e=>e.w===m.id).every(e=>(p.etoiles[e.id]||0)>0)).length>=cond.v;
    case"complet":return pk.exos.every(e=>(p.etoiles[e.id]||0)>0);
  }
  return false;
}
function condTxt(cond){
  if(!cond)return"";
  switch(cond.t){
    case"niveau":return"Niveau "+cond.v;
    case"etoiles":return cond.v+" ⭐";
    case"serie":return cond.v+" jours 🔥";
    case"defis":return cond.v+" défis 🎯";
    case"exos":return cond.v+" exercices ✅";
    case"mondes":return cond.v+(cond.v>1?" mondes finis":" monde fini");

}

  const p=P(),auj=dateJour();
  if(p.serie.last===auj)return;
  p.serie.count=(p.serie.last===hier())?p.serie.count+1:1;
  p.serie.last=auj;
  p.serie.record=Math.max(p.serie.record,p.serie.count);
}

/* ================== DÉFI DU JOUR (par profil) ================== */
function graine(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return()=>{h=Math.imul(h^(h>>>16),2246822507);h=Math.imul(h^(h>>>13),3266489909);return((h^=h>>>16)>>>0)/4294967296;};}
function defiDuJour(){
  const dispo=pc().exos.filter(e=>mondeOuvert(e.w));
  if(!dispo.length)return null;
  const r=graine("defi-"+P().parcours+"-"+dateJour())();
  return dispo[Math.floor(r*dispo.length)];
}

/* ================== CARTE D'ATLAS (SVG dessinée par la progression) ================== */
function carteSVG(mondeNeuf){
  const p=P(),ms=pc().mondes;
  const POS={
    3:[[70,182],[200,168],[320,88]],
    4:[[62,182],[175,196],[292,155],[330,75]],
    6:[[58,185],[148,202],[238,178],[318,126],[228,80],[112,54]]
  }[ms.length];
  let chemin="M"+POS[0][0]+" "+POS[0][1];
  for(let i=1;i<POS.length;i++){
    const x0=POS[i-1][0],y0=POS[i-1][1],x1=POS[i][0],y1=POS[i][1];
    chemin+=" Q"+((x0+x1)/2)+" "+(((y0+y1)/2)-20)+" "+x1+" "+y1;
  }
  const total=pc().exos.length,pct=Math.round(100*exosReussis(p)/total);
  const BLOB='<path d="M-34 2 C-40 -16 -22 -29 0 -26 C22 -30 40 -16 34 4 C40 18 20 29 0 26 C-20 30 -40 18 -34 2 Z"';
  let iles="";
  ms.forEach((m,i)=>{
    const x=POS[i][0],y=POS[i][1],ouvert=mondeOuvert(m.id),fini=mondeFini(p,m.id);
    const f=faits(p,m.id),n=exosDuMonde(m.id).length;
    if(!ouvert){
      iles+='<g transform="translate('+x+' '+y+')" opacity="0.7">'
       +BLOB+' fill="#d6d2c9" stroke="#b8b3a6" stroke-width="2" stroke-dasharray="5 4"/>'
       +'<text y="8" text-anchor="middle" font-size="19">🌫️</text></g>';
    }else{
      iles+='<g data-act="monde" data-w="'+m.id+'" transform="translate('+x+' '+y+')" style="cursor:pointer">'
       +'<g'+(m.id===mondeNeuf?' class="ile-neuve"':"")+'>'
       +BLOB+' fill="'+m.cnum+'" fill-opacity="'+(fini?0.95:(0.25+0.55*f/n).toFixed(2))+'" stroke="'+m.cnum+'" stroke-width="3"/>'
       +'<text y="5" text-anchor="middle" font-size="21">'+m.em+'</text>'
       +'<text y="20" text-anchor="middle" font-size="9.5" font-weight="bold" fill="'+(fini?"#fff":"#2D3436")+'">'+f+"/"+n+'</text>'
       +(fini?'<text x="24" y="-15" font-size="15">⭐</text>':"")
       +'</g></g>';
    }
  });
  return '<div class="carte atlas-carte"><svg viewBox="0 0 390 232">'
   +'<rect x="4" y="4" width="382" height="224" rx="18" fill="#FBF3E6" stroke="#E6D5B8" stroke-width="3"/>'
   +'<g opacity="0.5" transform="translate(352 30)"><path d="M0 -15 L4 0 L0 15 L-4 0 Z" fill="#C9A96B"/><path d="M-15 0 L0 -4 L15 0 L0 4 Z" fill="#E0CBA0"/><circle r="2.5" fill="#8a6f42"/></g>'
   +'<path d="'+chemin+'" fill="none" stroke="#C9A96B" stroke-width="3" stroke-dasharray="7 6" stroke-linecap="round" opacity="0.8"/>'
   +iles+'</svg>'
   +'<div class="legende-atlas">🗺️ Atlas redessiné à '+pct+' % — chaque énigme réussie colorie un territoire !</div></div>';
}

/* ----- type ordre : construction + glisser-déposer ----- */
let ordreItems=[];
function initOrdre(){
  ordreItems=melange(EX.ordre.map((t,i)=>({t,i})));
  if(ordreItems.every((o,k)=>o.i===k))ordreItems.reverse();
  ordreRep=[];rendOrdre();
}
function rendOrdre(){
  const zr=document.getElementById("zoneRep"),zs=document.getElementById("zoneSrc");
  if(!zr||!zs)return;
  zr.innerHTML=ordreRep.length?ordreRep.map((o,k)=>
    '<div class="chip dans-reponse" data-k="'+k+'"><span class="poignee">⠿</span><span>'+o.t+'</span></div>').join("")
   :'<div style="color:var(--gris);font-size:14px;text-align:center;padding:8px">Place ici la première étape…</div>';
  zs.innerHTML=ordreItems.map((o,k)=>
    '<div class="chip" data-s="'+k+'"><span class="poignee">＋</span><span>'+o.t+'</span></div>').join("");
  zs.querySelectorAll("[data-s]").forEach(el=>el.addEventListener("click",()=>{
    const k=+el.dataset.s;ordreRep.push(ordreItems[k]);ordreItems.splice(k,1);son("pose");rendOrdre();
  }));
  zr.querySelectorAll("[data-k]").forEach(el=>{
    el.addEventListener("pointerdown",ev=>debutGlisse(ev,el));
  });
}
let glisse=null;
function debutGlisse(ev,el){
  const k=+el.dataset.k;
  glisse={k,el,x0:ev.clientX,y0:ev.clientY,bouge:false,clone:null};
  el.setPointerCapture(ev.pointerId);
  el.addEventListener("pointermove",mvGlisse);
  el.addEventListener("pointerup",finGlisse);
  el.addEventListener("pointercancel",finGlisse);
}
function mvGlisse(ev){
  if(!glisse)return;
  if(!glisse.bouge&&Math.abs(ev.clientY-glisse.y0)<8&&Math.abs(ev.clientX-glisse.x0)<8)return;
  if(!glisse.bouge){
    glisse.bouge=true;
    const r=glisse.el.getBoundingClientRect();
    glisse.clone=glisse.el.cloneNode(true);glisse.clone.classList.add("drag");
    glisse.clone.style.setProperty("--wchip",r.width+"px");
    glisse.clone.style.left=r.left+"px";glisse.clone.style.top=r.top+"px";
    document.body.appendChild(glisse.clone);glisse.el.classList.add("fantome");
  }
  glisse.clone.style.transform="translate("+(ev.clientX-glisse.x0)+"px,"+(ev.clientY-glisse.y0)+"px) rotate(2deg)";
  const zr=document.getElementById("zoneRep");
  const chips=[...zr.querySelectorAll("[data-k]")].filter(c=>c!==glisse.el);
  let cible=ordreRep.length-1;
  for(let i=0;i<chips.length;i++){
    const r=chips[i].getBoundingClientRect();
    if(ev.clientY<r.top+r.height/2){cible=+chips[i].dataset.k;if(cible>glisse.k)cible--;break;}
    if(i===chips.length-1)cible=ordreRep.length-1;
  }
  glisse.cible=cible;
}
function finGlisse(ev){
  if(!glisse)return;
  const g2=glisse;glisse=null;
  g2.el.removeEventListener("pointermove",mvGlisse);
  g2.el.removeEventListener("pointerup",finGlisse);
  g2.el.removeEventListener("pointercancel",finGlisse);
  if(g2.clone)g2.clone.remove();
  if(g2.bouge){
    if(g2.cible!==undefined&&g2.cible!==g2.k){
      const it=ordreRep.splice(g2.k,1)[0];ordreRep.splice(g2.cible,0,it);son("pose");
    }
    rendOrdre();
  }else{
    const it=ordreRep.splice(g2.k,1)[0];ordreItems.push(it);son("clic");rendOrdre();
  }
}

/* ----- validation & feedback ----- */
const ENCOURAGEMENTS=["Pas tout à fait… mais tu es sur la bonne piste !","Hmm, ce n'est pas ça — respire un bon coup et relis l'énoncé.","Presque ! Les grands aventuriers se trompent souvent avant de trouver.","Ce n'est pas la bonne réponse, mais chaque essai t'apprend quelque chose !"];
function feedbackErreur(){
  essais++;son("ko");
  const z=document.getElementById("zoneRetour");
  let piste="";
  if(essais===1)piste="<br><b>Piste :</b> relis bien la question — que te demande-t-on exactement ?";
  if(essais>=2&&!indiceUtilise)piste="<br><b>Piste :</b> l'indice 💡 peut vraiment t'aider, il ne coûte qu'une étoile !";
  z.innerHTML='<div class="retour oups">😅 '+ENCOURAGEMENTS[Math.min(essais-1,3)]+piste+'</div>';
  if(essais>=2)ajouteBoutonSolution();
  z.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function ajouteBoutonSolution(){
  const zs=document.getElementById("zoneSolution");
  if(zs&&!zs.querySelector("[data-act='solution']")&&!zs.querySelector(".solution"))
    zs.innerHTML='<button class="btn doux large" data-act="solution" style="margin-top:12px">🗝️ Voir la solution expliquée</button>';
}

  if(!indiceUtilise){indiceUtilise=true;son("clic");}

}
function montreSolution(marqueVu){

   +EX.etapes.map((e,i)=>'<div class="etape-sol" style="animation-delay:'+(i*0.35)+'s"><span class="puce">'+(i+1)+'</span><span>'+e+'</span></div>').join("")

   +'</div>';

      setTimeout(()=>{ch.style.animation="";ch.style.borderColor="var(--lavande)";},600);}
  }else if(EX.type==="ordre"){

      document.getElementById("zoneRetour").innerHTML='<div class="retour indice">Place d\'abord toutes les étiquettes dans la zone !</div>';return;

/* ----- réussite ----- */
let mondeNeufEnAttente=0;
function mondesOuvertsIds(){return pc().mondes.filter(m=>mondeOuvert(m.id)).map(m=>m.id);}
function reussite(){
  resolu=1;arreteParole();son("ok");confettis(essais===0&&!indiceUtilise?130:80);
  const p=P();
  const ouvertsAvant=mondesOuvertsIds();
  let et=3;if(indiceUtilise)et--;if(essais>0)et--;et=Math.max(1,et);
  const deja=p.etoiles[EX.id]||0;
  p.etoiles[EX.id]=Math.max(deja,et);
  delete p.vus[EX.id];
  let xp=5+et*5;
  const defi=defiDuJour();
  let bonusDefi=false;
  if(defi&&defi.id===EX.id&&p.defiFait!==dateJour()){
    p.defiFait=dateJour();p.defisReussis=(p.defisReussis||0)+1;xp*=2;bonusDefi=true;
  }
  const nivAvant=niveau(p.xp);
  p.xp+=xp;majSerie();
  const nouveaux=verifBadges();
  const nivApres=niveau(p.xp);
  // objets du vestiaire fraîchement débloqués
  const objetsNouveaux=objetsDebloques(p).filter(o=>!p.objetsVus.includes(o.cle));
  objetsNouveaux.forEach(o=>p.objetsVus.push(o.cle));
  // nouveau monde déverrouillé ?
  const mondeNeufId=mondesOuvertsIds().find(id=>!ouvertsAvant.includes(id))||0;
  mondeNeufEnAttente=mondeNeufId;
  const mondeNeuf=mondeNeufId?pc().mondes[mondeNeufId-1]:null;
  sauve();
  if(mondeNeuf){setTimeout(()=>confettis(160),400);setTimeout(()=>son("badge"),350);}
  if(nouveaux.length||objetsNouveaux.length)setTimeout(()=>son("badge"),650);
  montreSolution(false);
  const MSGS=["Magnifique raisonnement !","Bravo, quel"+g("le exploratrice"," explorateur")+" !","Excellent ! La carte se redessine…","Tu as l'étoffe d'un"+g("e championne"," champion")+" !","Superbe ! Plume est impressionnée."];
  voile.innerHTML='<div class="modale">'
   +'<div style="font-size:50px">'+(et===3?"🏆":"🎉")+'</div>'
   +'<h2>'+MSGS[Math.floor(Math.random()*MSGS.length)]+'</h2>'
   +(mondeNeuf?'<div class="nouveau-monde"><span class="em">'+mondeNeuf.em+'</span>🗺️ NOUVEAU TERRITOIRE DÉCOUVERT !<br><b>'+mondeNeuf.nom+'</b><br><small style="font-weight:600;color:var(--gris)">Il apparaît sur ton Atlas…</small></div>':"")
   +'<div class="grosses-etoiles">'+[0,1,2].map(i=>'<span>'+(i<et?"⭐":"☆")+'</span>').join("")+'</div>'
   +(et<3&&deja<3?'<p class="msg">'+(indiceUtilise?"L'indice t'a coûté une étoile — la prochaine fois, tente d'abord tout seul"+g("e","")+" !":"Rejoue cet exercice un autre jour pour viser les 3 étoiles !")+'</p>':"")
   +'<div class="gain-xp">+'+xp+' XP'+(bonusDefi?" (défi ×2 ! 🎯)":"")+(nivApres>nivAvant?" · Niveau "+nivApres+" ! 🎖️":"")+'</div>'
   +nouveaux.map(b=>'<div class="nouveau-badge"><span class="em">'+b.em+'</span>Nouveau badge : <b>'+b.nom+'</b></div>').join("")
   +objetsNouveaux.map(o=>'<div class="nouveau-badge" style="background:#EFEBFF"><span class="em">'+o.em+'</span>🎁 Débloqué : <b>'+o.nom+'</b> — file voir ton vestiaire !</div>').join("")
   +'<div style="display:flex;gap:10px;margin-top:6px">'
   +'<button class="btn doux" data-act="revoir" style="flex:1">Relire la solution</button>'
   +'<button class="btn vert" data-act="suivant" style="flex:1">Continuer →</button></div></div>';
  voile.classList.add("actif");
}
function exoSuivant(){
  voile.classList.remove("actif");
  if(mondeNeufEnAttente){const w=mondeNeufEnAttente;mondeNeufEnAttente=0;rCarte(w);return;}
  if(estDefi){rCarte();return;}
  const liste=exosDuMonde(EX.w);
  const prochain=liste.find(e=>!(P().etoiles[e.id]>0)&&e.id!==EX.id);
  if(prochain)rExo(prochain.id);else rMonde(EX.w);
}

     return '<button class="acc-btn'+(p.acc===a.id?" sel":"")+(ok?"":" verrou")+'" data-vest="acc:'+a.id+'" '+(ok?"":"disabled")+'>'

function validerRenommage(){
  const ch=document.getElementById("champRenom");
  if(!ch)return;
  const v=ch.value.trim();
  if(!v){ch.style.borderColor="var(--corail)";return;}
  P().nom=v.slice(0,16);sauve();son("ok");rProfil();
}

/* ================== NAVIGATION GLOBALE ================== */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act],[data-choix],[data-vf],[data-justif],[data-choisir]");
  if(!el)return;
  if(el.dataset.choisir){S.actif=el.dataset.choisir;sauve();son("ok");rCarte();return;}
  if(el.dataset.choix!==undefined)return clicQCM(el);
  if(el.dataset.vf!==undefined)return clicVF(el);
  if(el.dataset.justif!==undefined)return clicJustif(el);
  const act=el.dataset.act;
  if(act==="muet"){S.muet=!S.muet;sauve();el.textContent=S.muet?"🔇":"🔊";if(S.muet)arreteParole();return;}
  son("clic");
  if(act==="retour"){arreteParole();if(el.dataset.vers==="monde"&&EX)rMonde(EX.w);else rCarte();}
  else if(act==="profil"){arreteParole();rProfil();}
  else if(act==="renommer")rProfil(true);
  else if(act==="valider-nom")validerRenommage();
  else if(act==="vers-profils"||act==="retour-profils"){arreteParole();rProfils();}
  else if(act==="nouveau-profil"){arreteParole();rNouveauProfil();}
  else if(act==="monde"){const w=+el.dataset.w;if(mondeOuvert(w)){arreteParole();rMonde(w);}else son("ko");}
  else if(act==="exo")rExo(el.dataset.id);
  else if(act==="defi")rExo(el.dataset.id,true);
  else if(act==="indice")montreIndice();
  else if(act==="parler")parle(EX.histoire+". "+EX.q);
  else if(act==="valider")validerExo();
  else if(act==="solution")montreSolution(true);
  else if(act==="retour-apres-solution"){
    if(mondeNeufEnAttente){const w=mondeNeufEnAttente;mondeNeufEnAttente=0;rCarte(w);}
    else rMonde(EX.w);
  }
  else if(act==="revoir"){
    voile.classList.remove("actif");
    const barre=document.querySelector(".barre-exo");
    if(barre)barre.innerHTML='<button class="btn vert large" data-act="suivant">Continuer →</button>';
    document.getElementById("zoneSolution").scrollIntoView({behavior:"smooth",block:"nearest"});
  }
  else if(act==="suivant")exoSuivant();
  else if(act==="reset"){
    if(el.dataset.confirme){
      const id=S.actif,ancien=S.profils[id];
      const neuf=PROFIL_DEFAUT();
      neuf.id=id;neuf.nom=ancien.nom;neuf.genre=ancien.genre;
      neuf.cheveux=ancien.cheveux;neuf.peau=ancien.peau;neuf.coiffure=ancien.coiffure;
      neuf.parcours=ancien.parcours;
      S.profils[id]=neuf;sauve();rCarte();
    }
    else{el.dataset.confirme="1";el.textContent="Sûr"+g("e","")+" ? Touche encore une fois pour tout effacer !";}
  }
});
